pre-commit:
  parallel: true
  commands:
    fmt-fix:
      glob: "*.rs"
      run: mise run fmt
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: mise run clippy
    verify-man:
      glob: "*.rs"
      run: mise run man:verify
    verify-cli-docs:
      glob: "*.rs"
      run: mise run docs:cli:verify
    prettier-format:
      glob: "*.{md,yml,yaml}"
      run: bun run prettier --write {staged_files}
      stage_fixed: true
    biome-check:
      glob: "docs/.vitepress/**/*.{ts,js,json}"
      root: "docs/"
      run: bunx biome check --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    conventional-commit:
      run: mise exec -- cog verify "$(head -1 {1})"

pre-push:
  commands:
    unit-tests:
      glob: "*.rs"
      run: mise run test:unit
