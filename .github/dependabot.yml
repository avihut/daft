# Dependabot configuration for automatic dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Cooldown policy: every ecosystem waits 7 days before opening a version-update
# PR. Security updates bypass cooldown automatically (Dependabot behavior, not
# configurable). To exempt a specific package, add it under cooldown.exclude.

version: 2
updates:
  # Monitor Cargo dependencies (Rust packages)
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Asia/Jerusalem"
    cooldown:
      default-days: 7
    # Group all Cargo updates into a single PR when possible
    groups:
      cargo-dependencies:
        patterns:
          - "*"
    # Automatically add labels to PRs
    labels:
      - "dependencies"
    # Limit number of open PRs
    open-pull-requests-limit: 5
    # Commit message configuration
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    # Automatically rebase PRs when base branch updates
    rebase-strategy: "auto"

  # Monitor GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Asia/Jerusalem"
    cooldown:
      default-days: 7
    # Group all GitHub Actions updates into a single PR
    groups:
      github-actions:
        patterns:
          - "*"
    # dtolnay/rust-toolchain tags name the Rust toolchain version they install
    # (e.g. @1.93.0 installs Rust 1.93.0), not a version of the action itself.
    # Dependabot can't see this — bumping the tag would request a non-existent
    # toolchain. The MSRV value is owned by Cargo.toml's rust-version field.
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    rebase-strategy: "auto"

  # Root JS deps (prettier dev dep, bun.lock at repo root)
  - package-ecosystem: "bun"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Asia/Jerusalem"
    cooldown:
      default-days: 7
    groups:
      js-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps"
      include: "scope"
    rebase-strategy: "auto"

  # Docs site JS deps (VitePress + Biome, bun.lock under /docs)
  - package-ecosystem: "bun"
    directory: "/docs"
    target-branch: "master"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Asia/Jerusalem"
    cooldown:
      default-days: 7
    groups:
      docs-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "docs"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(docs)"
      include: "scope"
    rebase-strategy: "auto"
