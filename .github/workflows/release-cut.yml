name: Cut release

# Replaces .github/workflows/release-plz.yml. Trigger model: deliberate,
# via the "Run workflow" button in the Actions UI with a patch/minor/major
# selector. cargo-release does the version bump, regenerates the changelog
# (via git-cliff per cliff.toml) and the man pages + CLI docs (via the
# pre-release-hook in release.toml), commits as `chore: release v{version}`,
# tags `v{version}`, and pushes. cargo-dist's release.yml then picks up the
# tag and builds the binary release exactly as it did under release-plz.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        type: choice
        required: true
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  cut-release:
    name: Cut release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.WHEATLEY_BOT_APP_ID }}
          private-key: ${{ secrets.WHEATLEY_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-release and git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-release,git-cliff

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Cut release
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          # cargo release: bumps daft (and xtask's daft-path-dep version) to
          # next $BUMP, runs the pre-release-hook from release.toml, commits,
          # tags, and pushes both branch + tag.
          cargo release "$BUMP" --package daft --execute --no-confirm
