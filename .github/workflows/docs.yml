name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "Cargo.toml"
      - ".github/workflows/docs.yml"
  # Build (without deploying) on PRs that touch the docs, so a broken VitePress
  # build is caught before merge. This workflow previously only ran on push to
  # master, so bad Markdown (e.g. unclosed angle-bracket placeholders parsed as
  # Vue elements) reached master undetected and broke every deploy. The Deploy
  # step below is gated to non-PR events.
  pull_request:
    paths:
      - "docs/**"
      - "Cargo.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2

      # wrangler-action installs `wrangler@4` via bun and then verifies it with
      # `bun run wrangler --version`. That verification shells out to system
      # Node, and wrangler 4 requires Node ≥ 22 — but ubuntu-latest still ships
      # Node 20.x as the default. Without this step the deploy fails with
      # "Wrangler requires at least Node.js v22.0.0". Pinning to the current
      # Active LTS (24, EOL April 2028) buys the longest runway.
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: docs
        run: bunx vitepress build

      # Deploy only on push to master and manual dispatch — never on PR builds,
      # which validate the VitePress build without publishing. github.event_name
      # is a trusted, GitHub-controlled value (no untrusted-input injection).
      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          command:
            pages deploy docs/.vitepress/dist --project-name avihu-daft --branch
            main
