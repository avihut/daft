name: Test Git Worktree Workflow

on:
  pull_request:
    branches: [main, master]
    # Default to running on any change, then negate the things that don't
    # affect the Rust build/test surface. New files default to triggering
    # this workflow -- safer than allowlisting and forgetting to update.
    # Note: .github/workflows/test.yml is intentionally NOT negated, so
    # changes to this workflow re-run the suite to validate them.
    paths:
      - "**"
      - "!*.md"
      - "!docs/**"
      - "!.github/CODEOWNERS"
      - "!.github/dependabot.yml"
      - "!.github/workflows/bench.yml"
      - "!.github/workflows/claude-pr-review.yml"
      - "!.github/workflows/docs.yml"
      - "!.github/workflows/mise-tool-updates.yml"
      - "!.github/workflows/release-plz.yml"
      - "!.github/workflows/release.yml"
      - "!.github/workflows/test-homebrew.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which kinds of files changed in this PR. Each downstream job
  # gates on these outputs so we only spin up runners when relevant. Any
  # change to test.yml itself sets `self=true`, which OR's into every
  # other gate, so editing the workflow re-validates the whole suite.
  # Skipped jobs consume zero CI minutes.
  changes:
    runs-on: ubuntu-latest
    outputs:
      self: ${{ steps.detect.outputs.self }}
      rust: ${{ steps.detect.outputs.rust }}
      tests: ${{ steps.detect.outputs.tests }}
      xtask: ${{ steps.detect.outputs.xtask }}
      man: ${{ steps.detect.outputs.man }}
      lockfile: ${{ steps.detect.outputs.lockfile }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          files=$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')
          echo "Changed files in this PR:"
          echo "$files"
          echo "---"

          self=false
          rust=false
          tests=false
          xtask=false
          man=false
          lockfile=false

          if echo "$files" | grep -qxE '\.github/workflows/test\.yml'; then
            self=true
          fi
          if echo "$files" | grep -qE '^(src/|Cargo\.(toml|lock)|mise\.(toml|lock)|lefthook\.yml)'; then
            rust=true
          fi
          if echo "$files" | grep -qE '^(tests/|scripts/)'; then
            tests=true
          fi
          if echo "$files" | grep -qE '^xtask/'; then
            xtask=true
          fi
          if echo "$files" | grep -qE '^(man/|docs/cli/)'; then
            man=true
          fi
          if echo "$files" | grep -qxE '(Cargo\.lock|bun\.lock|\.dep-age-allowlist|cooldown\.toml|bunfig\.toml)'; then
            lockfile=true
          fi

          for k in self rust tests xtask man lockfile; do
            echo "$k=${!k}" | tee -a "$GITHUB_OUTPUT"
          done

  # Supply-chain gate: refuse PRs that introduce dep-lock entries younger than
  # 7 days (Cargo.lock + bun.lock). Bypass via .dep-age-allowlist (with
  # rationale) or commit env ALLOW_FRESH_DEPS=1 in an emergency.
  dep-age-check:
    needs: changes
    if:
      needs.changes.outputs.self == 'true' || needs.changes.outputs.lockfile ==
      'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check lockfile freshness
        env:
          # github.base_ref is a refname (cannot contain shell metacharacters
          # per git ref-format rules); we still funnel it through env to avoid
          # interpolating it into the shell command directly.
          PR_BASE_REF: ${{ github.base_ref }}
        run: BASE_REF="origin/${PR_BASE_REF}" scripts/check-lockfile-age.sh

  # Fast feedback: formatting, linting, unit tests (debug mode only - no release build needed)
  lint:
    needs: changes
    if:
      needs.changes.outputs.self == 'true' || needs.changes.outputs.rust ==
      'true' || needs.changes.outputs.tests == 'true' ||
      needs.changes.outputs.xtask == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install mise
        uses: jdx/mise-action@v4

      # mise installs the toolchain pinned in mise.toml (rust = "1.93") and
      # exports RUSTUP_TOOLCHAIN, overriding the dtolnay-installed `stable`.
      # Components from the dtolnay step were installed for `stable`, not for
      # the mise-managed 1.93.x — re-install them for the active toolchain so
      # `cargo fmt`/`cargo clippy` resolve against a complete component set.
      - name: Ensure rustfmt + clippy for mise-managed toolchain
        run: rustup component add rustfmt clippy

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Check docs formatting
        run: bun run prettier --check '**/*.md' '**/*.{yml,yaml}'

      - name: Run Rust clippy
        run: mise run clippy

      - name: Run Rust unit tests
        run: mise run test:unit

  # MSRV check — proves the source still compiles under the pinned floor
  # declared in Cargo.toml's `rust-version`. `cargo check` is enough; the
  # `lint` job above already runs full build+test on stable. Cheap minutes
  # gate that prevents silent MSRV regressions when new code accidentally
  # uses post-1.93 stdlib features.
  msrv-check:
    needs: changes
    if:
      needs.changes.outputs.self == 'true' || needs.changes.outputs.rust ==
      'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust 1.93 (MSRV)
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.93

      - name: Cargo check at MSRV
        run: cargo check --all-targets

  # Windows compile check — ensures the codebase still builds for the
  # x86_64-pc-windows-msvc target that the release workflow ships. This
  # only runs `cargo check`, not a full build or test, so it stays fast
  # while catching platform-specific regressions (e.g. unconditional use
  # of `std::os::unix::*` or `libc`) before they reach a release tag.
  windows-check:
    needs: changes
    if:
      needs.changes.outputs.self == 'true' || needs.changes.outputs.rust ==
      'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cargo check (Windows)
        run: cargo check --all-targets

  # Test xtask man page generation
  xtask-test:
    needs: changes
    if:
      needs.changes.outputs.self == 'true' || needs.changes.outputs.rust ==
      'true' || needs.changes.outputs.xtask == 'true' ||
      needs.changes.outputs.man == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Test xtask gen-man
        run: |
          mkdir -p /tmp/man-test
          cargo run --package xtask -- gen-man --output-dir=/tmp/man-test

          # Verify all expected man pages were generated
          for page in git-worktree-clone git-worktree-init git-worktree-checkout \
                      git-worktree-branch git-worktree-branch-delete \
                      git-worktree-prune git-worktree-carry \
                      git-worktree-fetch git-worktree-flow-adopt git-worktree-flow-eject \
                      git-worktree-sync daft-release-notes; do
            if [ ! -f "/tmp/man-test/${page}.1" ]; then
              echo "FAILED: Missing man page: ${page}.1"
              exit 1
            fi
            # Verify it's valid groff format (has .TH header)
            if ! head -20 "/tmp/man-test/${page}.1" | grep -q '\.TH'; then
              echo "FAILED: Invalid man page format: ${page}.1"
              exit 1
            fi
            echo "  ${page}.1 - OK"
          done
          echo "All man pages generated and validated!"

      - name: Verify committed man pages are up-to-date
        run: |
          # Skip verification on release PRs - release-plz bumps version in Cargo.toml
          # which causes man pages (that embed version) to appear outdated
          if [[ "${{ github.head_ref }}" == release-plz-* ]]; then
            echo "Skipping man page verification on release PR (version bump expected)"
            exit 0
          fi

          cargo run --package xtask -- gen-man --output-dir=man
          if ! git diff --exit-code man/; then
            echo "FAILED: Committed man pages are out of date!"
            echo "Run 'mise run man:gen' locally and commit the changes."
            exit 1
          fi
          echo "Committed man pages are up-to-date!"

      - name: Test xtask gen-cli-docs
        run: |
          mkdir -p /tmp/cli-docs-test
          cargo run --package xtask -- gen-cli-docs --output-dir=/tmp/cli-docs-test

          # Verify all expected CLI docs were generated
          for page in git-worktree-clone git-worktree-init git-worktree-checkout \
                      git-worktree-branch git-worktree-branch-delete \
                      git-worktree-prune git-worktree-carry \
                      git-worktree-fetch git-worktree-flow-adopt git-worktree-flow-eject \
                      git-worktree-merge git-worktree-sync daft-doctor daft-release-notes; do
            if [ ! -f "/tmp/cli-docs-test/${page}.md" ]; then
              echo "FAILED: Missing CLI doc: ${page}.md"
              exit 1
            fi
            # Verify it has valid markdown structure (frontmatter and Usage section)
            if ! head -5 "/tmp/cli-docs-test/${page}.md" | grep -q '^---'; then
              echo "FAILED: CLI doc missing frontmatter: ${page}.md"
              exit 1
            fi
            if ! grep -q '## Usage' "/tmp/cli-docs-test/${page}.md"; then
              echo "FAILED: CLI doc missing Usage section: ${page}.md"
              exit 1
            fi
            echo "  ${page}.md - OK"
          done
          echo "All CLI docs generated and validated!"

      - name: Verify committed CLI docs are up-to-date
        run: |
          # Skip verification on release PRs - release-plz bumps version in Cargo.toml
          # which causes CLI docs (that embed version) to appear outdated
          if [[ "${{ github.head_ref }}" == release-plz-* ]]; then
            echo "Skipping CLI docs verification on release PR (version bump expected)"
            exit 0
          fi

          cargo run --package xtask -- gen-cli-docs --output-dir=docs/cli
          if ! git diff --exit-code docs/cli/; then
            echo "FAILED: Committed CLI docs are out of date!"
            echo "Run 'mise run docs:cli:gen' locally and commit the changes."
            exit 1
          fi
          echo "Committed CLI docs are up-to-date!"

      - name: Run xtask unit tests
        run: cargo test --package xtask

  # Build release binary once, share across integration test matrix
  build:
    needs: changes
    if:
      needs.changes.outputs.self == 'true' || needs.changes.outputs.rust ==
      'true' || needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Rust binaries
        run: |
          cargo build --release
          cargo build --release --package xtask

      - name: Clean old binaries from cache
        run: |
          # Remove any old binaries that might be in cache from before src/bin/ was removed
          rm -f target/release/git-worktree-*
          echo "Cleaned old binaries from cache"

      - name: Verify single binary architecture
        run: |
          echo "Verifying single binary architecture..."
          # Count executables in target/release (excluding .d files and symlinks)
          # Use a portable approach: find files and test if executable with shell
          BINARY_COUNT=0
          for file in target/release/*; do
            if [ -f "$file" ] && [ ! -L "$file" ] && [ -x "$file" ]; then
              case "$file" in
                *.d) ;;  # Skip .d files
                *) BINARY_COUNT=$((BINARY_COUNT + 1)) ;;
              esac
            fi
          done
          echo "Found $BINARY_COUNT binary executable(s)"

          # Verify exactly 2 binaries exist (daft + xtask)
          if [ "$BINARY_COUNT" -ne 2 ]; then
            echo "ERROR: Expected exactly 2 binaries (daft + xtask), found $BINARY_COUNT"
            echo "Binaries found:"
            for file in target/release/*; do
              if [ -f "$file" ] && [ ! -L "$file" ] && [ -x "$file" ]; then
                case "$file" in
                  *.d) ;;
                  *) ls -lh "$file" ;;
                esac
              fi
            done
            exit 1
          fi

          # Verify it's named 'daft'
          if [ ! -f target/release/daft ]; then
            echo "ERROR: Binary 'daft' not found"
            exit 1
          fi

          echo "Binary architecture verified: daft + xtask binaries exist"
          ls -lh target/release/daft target/release/xtask

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: daft-binary
          path: |
            target/release/daft
            target/release/xtask
          retention-days: 1

  # Integration tests (Linux only) — 4 parallel workers:
  # {default, gitoxide} x {bash, yaml}
  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        entry: [default, gitoxide]
        suite: [bash, yaml]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Git
        run: |
          git config --global user.name "Test User"
          git config --global user.email "test@example.com"

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: daft-binary
          path: target/release

      - name: Set up binary
        run: |
          chmod +x target/release/daft
          chmod +x target/release/xtask

          # Create symlinks for the multicall binary
          cd target/release
          for cmd in git-worktree-clone git-worktree-init git-worktree-checkout \
                     git-worktree-branch git-worktree-branch-delete \
                     git-worktree-prune git-worktree-carry \
                     git-worktree-fetch git-worktree-flow-adopt git-worktree-flow-eject \
                     git-worktree-list git-worktree-merge git-worktree-sync \
                     git-worktree-exec git-daft \
                     daft-go daft-start daft-remove daft-rename; do
            ln -sf daft "$cmd"
          done
          cd ../..

          echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH

      - name: Make test scripts executable
        if: matrix.suite == 'bash'
        run: chmod +x tests/integration/*.sh

      - name: Set up config
        id: config
        run: |
          CONFIG_FILE=$(mktemp)
          if [ "${{ matrix.entry }}" = "gitoxide" ]; then
            git config --file "$CONFIG_FILE" daft.experimental.gitoxide true
          fi
          echo "config_file=$CONFIG_FILE" >> "$GITHUB_OUTPUT"

      - name: Run bash integration tests
        if: matrix.suite == 'bash'
        run: |
          GIT_CONFIG_GLOBAL="${{ steps.config.outputs.config_file }}" \
            DAFT_TESTING=1 bash tests/integration/test_all.sh

      - name: Run YAML manual tests
        if: matrix.suite == 'yaml'
        run: |
          GIT_CONFIG_GLOBAL="${{ steps.config.outputs.config_file }}" \
            DAFT_TESTING=1 ./target/release/xtask manual-test --ci

      - name: Test shell completions
        if: matrix.suite == 'bash'
        run: ./tests/integration/test_completions.sh

      - name: Test help commands
        if: matrix.suite == 'bash'
        run: |
          ./target/release/git-worktree-clone --help
          ./target/release/git-worktree-checkout --help
          ./target/release/git-worktree-init --help
          ./target/release/git-worktree-prune --help
          ./target/release/git-worktree-carry --help
          ./target/release/git-worktree-fetch --help
          ./target/release/git-worktree-flow-adopt --help
          ./target/release/git-worktree-flow-eject --help
          ./target/release/git-worktree-sync --help
          ./target/release/daft-go --help
          ./target/release/daft-start --help
          ./target/release/daft-remove --help
          ./target/release/daft-rename --help
          ./target/release/daft | head -20
          ./target/release/git-daft | head -20

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.entry }}-${{ matrix.suite }}
          path: |
            tests/test-results.log
          retention-days: 7
          if-no-files-found: ignore

  # Homebrew installation simulation (macOS)
  homebrew-simulation:
    needs: changes
    if:
      needs.changes.outputs.self == 'true' || needs.changes.outputs.rust ==
      'true' || needs.changes.outputs.man == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Rust binaries
        run: cargo build --release

      - name: Simulate Homebrew installation
        run: |
          PREFIX="$HOME/.local"
          mkdir -p "$PREFIX/bin" "$PREFIX/share/man/man1"

          # Install main binary
          cp target/release/daft "$PREFIX/bin/"
          chmod +x "$PREFIX/bin/daft"

          # Create symlinks for all commands (matching Homebrew formula)
          for cmd in git-worktree-clone git-worktree-checkout \
                     git-worktree-init git-worktree-branch git-worktree-branch-delete \
                     git-worktree-prune git-worktree-carry git-worktree-fetch \
                     git-worktree-flow-adopt git-worktree-flow-eject \
                     git-worktree-merge git-worktree-sync git-daft \
                     daft-go daft-start daft-remove daft-rename; do
            ln -sf daft "$PREFIX/bin/$cmd"
          done

          # Install pre-generated man pages
          cp man/*.1 "$PREFIX/share/man/man1/"

          echo "Installation complete. Installed files:"
          ls -la "$PREFIX/bin/"
          ls -la "$PREFIX/share/man/man1/"

      - name: Verify Homebrew symlinks work
        run: |
          PREFIX="$HOME/.local"
          export PATH="$PREFIX/bin:$PATH"

          echo "Verifying daft binary..."
          daft --version

          echo "Verifying all symlinked commands..."
          for cmd in git-worktree-clone git-worktree-checkout \
                     git-worktree-init git-worktree-branch git-worktree-branch-delete \
                     git-worktree-prune git-worktree-carry git-worktree-fetch \
                     git-worktree-flow-adopt git-worktree-flow-eject \
                     git-worktree-merge git-worktree-sync git-daft \
                     daft-go daft-start daft-remove daft-rename; do
            echo "  Testing $cmd..."
            "$PREFIX/bin/$cmd" --help > /dev/null || { echo "FAILED: $cmd --help"; exit 1; }
          done

          echo "All symlinked commands verified!"

      - name: Verify man pages
        run: |
          PREFIX="$HOME/.local"

          echo "Verifying man pages exist and are valid..."
          # Only git-worktree-* commands have man pages (not daft or git-daft)
          for page in git-worktree-clone git-worktree-checkout \
                      git-worktree-init git-worktree-branch git-worktree-branch-delete \
                      git-worktree-prune git-worktree-carry git-worktree-fetch \
                      git-worktree-flow-adopt git-worktree-flow-eject \
                      git-worktree-merge git-worktree-sync; do
            MANFILE="$PREFIX/share/man/man1/${page}.1"
            if [ ! -f "$MANFILE" ]; then
              echo "FAILED: Missing man page: $page"
              exit 1
            fi
            # Verify it's valid groff format (has .TH header)
            if ! head -20 "$MANFILE" | grep -q '\.TH'; then
              echo "FAILED: Invalid man page format: $page"
              exit 1
            fi
            echo "  $page.1 - OK"
          done

          echo "All man pages verified!"

      - name: Test Homebrew installation with git prefix
        run: |
          PREFIX="$HOME/.local"
          export PATH="$PREFIX/bin:$PATH"

          # Verify git can discover the commands
          # Use -h instead of --help because macOS git opens man pages for --help
          echo "Testing git command discovery..."
          git worktree-clone -h > /dev/null || { echo "FAILED: git worktree-clone not found"; exit 1; }
          git worktree-checkout -h > /dev/null || { echo "FAILED: git worktree-checkout not found"; exit 1; }
          git daft -h > /dev/null || { echo "FAILED: git daft not found"; exit 1; }

          echo "Git command discovery verified!"
          echo "Homebrew simulation test PASSED!"
