# mise configuration for daft
# Run `mise tasks` to see available tasks

[settings]
# Refuse to install tool versions younger than 7 days (supply-chain cooldown).
# Pinned versions like `bun = "1.3.11"` bypass the gate automatically. Override
# per-invocation with `mise install foo --before <date|duration>`.
# https://mise.jdx.dev/configuration/settings.html#minimum_release_age
# Affects backends that report release timestamps: aqua, cargo, npm, pipx,
# and select core plugins (covers everything in [tools] below).
minimum_release_age = "7d"

[tools]
# cargo-binstall: bootstrap it first (prebuilt via the aqua backend) so the
# `cargo:` tools below install from prebuilt GitHub-release binaries instead
# of compiling from source. mise's `cargo.binstall` setting defaults to true
# but only kicks in when cargo-binstall is on PATH — and mise does NOT
# auto-install it. Without this line a cold machine spends >5min compiling
# cargo-deny + cargo-cooldown, which blows the 300s post-clone /
# worktree-post-create hook timeout (the failure that motivated this entry).
# Pin the aqua backend explicitly so binstall itself never falls back to a
# cargo-from-source build (chicken-and-egg).
"aqua:cargo-bins/cargo-binstall" = "1.18.1"
rust = "1.95"
lefthook = "2.1.6"
cocogitto = "7.0.0"
bun = "1.3.13"
bat = "0.26.1"
# neovim: the vfox:mise-plugins/vfox-neovim backend does not record a
# concrete version in mise.lock — it stays "stable". Leave the tag-based
# selector. Weekly mise-tool-updates.yml refreshes the install.
neovim = "stable"
# cargo-cooldown: optional supply-chain guard. Wraps `cargo
# build|check|test|run|update` to refuse package versions younger than the
# window in cooldown.toml. Doesn't gate `cargo add` directly — pair it with
# the lockfile-age CI check (scripts/check-lockfile-age.sh). Disabled in CI
# (see MISE_DISABLE_TOOLS in .github/workflows/test.yml lint job) because
# scripts/check-lockfile-age.sh enforces the same policy at PR boundary.
"cargo:cargo-cooldown" = "0.3.0"
# cargo-deny: license / advisory / source policy gate. Run via `mise run
# deny`; enforced in CI on every PR that touches Cargo.toml, Cargo.lock, or
# deny.toml. Pinned to lockfile version (matches the post-#498 convention
# of pinning over "latest" to avoid per-install registry resolution and
# trim a CI flake surface).
"cargo:cargo-deny" = "0.19.4"

[env]
_.path = ["./target/release"]
# Resolve DAFT_CONFIG_DIR dynamically to the git common dir so the
# sandbox is shared across all worktrees (trust, repos.json, layout).
_.source = ["shared-env.sh"]
INTEGRATION_TESTS_DIR = "tests/integration"
INTEGRATION_TEMP_DIR = "/tmp/git-worktree-integration-tests"

# Sync mise tools and JS deps automatically on cd. The hash gate keeps this
# nearly free when nothing changed; when mise.toml/mise.lock or
# package.json/bun.lock change (e.g. after `git pull` and a re-cd), it
# proactively re-runs the install commands.
[hooks]
enter = """
mkdir -p .mise
hashfile=".mise/deps_hash"
hash_inputs() { cat package.json bun.lock mise.toml mise.lock 2>/dev/null; }
current_hash=$(hash_inputs | md5 -q 2>/dev/null || hash_inputs | md5sum | cut -d' ' -f1)
if [ ! -d "node_modules" ] || [ ! -f "$hashfile" ] || [ "$(cat "$hashfile" 2>/dev/null)" != "$current_hash" ]; then
  echo "[mise] Syncing dev tools and JS deps..."
  mise install
  bun install --frozen-lockfile 2>/dev/null || bun install
  current_hash=$(hash_inputs | md5 -q 2>/dev/null || hash_inputs | md5sum | cut -d' ' -f1)
  echo "$current_hash" > "$hashfile"
fi
"""
