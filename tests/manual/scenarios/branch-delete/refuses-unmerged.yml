name: Branch delete refuses unmerged
description: Rejects unmerged branches without --force

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone and create feature branch
    run: |
      git-worktree-clone $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/unmerged
      cd $WORK_DIR/test-repo/feature/unmerged
      echo "unmerged work" > unmerged.txt
      git add unmerged.txt
      git commit -m "Unmerged work"
      git push origin feature/unmerged
    expect:
      exit_code: 0

  - name: Delete without --force should fail
    run: git-worktree-branch-delete feature/unmerged 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/unmerged"
