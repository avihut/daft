name: Remove an unchanged worktree carrying a propagated visitor daft.yml
description: >
  Regression for the field report. A visitor daft.yml (untracked, hidden via
  .git/info/exclude) is propagated to a new worktree on checkout. The propagated
  copy must be byte-for-byte identical to the source (shared preserved, comments
  intact, no null litter), and removing the unchanged worktree must succeed
  instead of being blocked by the worktree-removal divergence guard.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Write a visitor daft.yml in main and hide it from git
    run: |
      printf '# my visitor config\nshared: [.env]\n\nhooks:\n  worktree-post-create:\n    jobs:\n      - name: example\n        run: echo hi\n' > daft.yml
      printf '/daft.yml\n' >> "$(git rev-parse --git-path info/exclude)"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Confirm daft.yml is now an ignored (visitor) file
    run: git check-ignore daft.yml
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "daft.yml"

  - name: Checkout a new branch, propagating the visitor daft.yml verbatim
    run: git-worktree-checkout -b wip
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/wip/daft.yml"
      file_contains:
        - path: "$WORK_DIR/test-repo/wip/daft.yml"
          content: "shared: [.env]"
        - path: "$WORK_DIR/test-repo/wip/daft.yml"
          content: "# my visitor config"
      file_not_contains:
        - path: "$WORK_DIR/test-repo/wip/daft.yml"
          content: "min_version:"

  - name:
      Remove the unchanged worktree (guard must not block, main must not be
      rewritten)
    run: daft-remove --local wip
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/wip"
      # The merge-on-delete propagation must NOT rewrite main when the removed
      # worktree adds nothing: main/daft.yml stays byte-for-byte intact (comments
      # and shared preserved, never canonicalized into null-littered YAML).
      file_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "# my visitor config"
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "shared: [.env]"
      file_not_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "min_version:"
