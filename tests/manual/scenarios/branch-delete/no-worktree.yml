name: Branch delete no worktree
description: Delete branch that has no worktree (branch-only)

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a branch without a worktree
    run: |
      cd $WORK_DIR/test-repo/main
      git branch no-worktree-branch
    expect:
      exit_code: 0

  - name: Verify branch exists
    run: cd $WORK_DIR/test-repo/main && git branch | grep "no-worktree-branch"
    expect:
      exit_code: 0

  - name: Delete branch-only (no worktree)
    run: git-worktree-branch-delete no-worktree-branch
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Verify branch was deleted
    run:
      cd $WORK_DIR/test-repo/main && git branch | grep "no-worktree-branch" ||
      echo "BRANCH_GONE"
    expect:
      output_contains:
        - "BRANCH_GONE"
