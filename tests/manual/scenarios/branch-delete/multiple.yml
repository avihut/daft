name: Branch delete multiple
description: Delete multiple branches at once

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone and create two feature branches
    run: |
      git-worktree-clone --layout contained $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/one
      git-worktree-checkout -b feature/two
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/one"
        - "$WORK_DIR/test-repo/feature/two"

  - name: Merge both branches into main
    run: |
      cd $WORK_DIR/test-repo/main
      git merge feature/one
      git merge feature/two
      git push origin main
    expect:
      exit_code: 0

  - name: Push both feature branches
    run: |
      cd $WORK_DIR/test-repo/feature/one
      git push origin feature/one
      cd $WORK_DIR/test-repo/feature/two
      git push origin feature/two
    expect:
      exit_code: 0

  - name: Delete both branches at once
    run: git-worktree-branch-delete feature/one feature/two
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/feature/one"
        - "$WORK_DIR/test-repo/feature/two"
