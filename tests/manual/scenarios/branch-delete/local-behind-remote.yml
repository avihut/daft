name: Branch delete local behind remote
description: Delete branch when local main is behind remote main

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Advance remote main after clone
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git checkout main
      echo "upstream work" > upstream.txt
      git add upstream.txt
      git commit -m "Upstream commit"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Create feature branch (based on new remote main)
    run: git-worktree-checkout -b feature/behind-test
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/behind-test"

  - name:
      Delete the branch (local main is behind but branch is ancestor of
      origin/main)
    run: git-worktree-branch-delete feature/behind-test
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/feature/behind-test"

  - name: Verify local branch was deleted
    run:
      cd $WORK_DIR/test-repo/main && git branch | grep " feature/behind-test$"
      || echo "BRANCH_GONE"
    expect:
      output_contains:
        - "BRANCH_GONE"
