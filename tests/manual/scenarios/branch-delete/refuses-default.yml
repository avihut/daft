name: Branch delete refuses default
description: Refuses to delete default branch without --force

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Delete default branch should fail
    run: git-worktree-branch-delete main 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
