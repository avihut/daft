name: Force-delete default branch from current worktree
description: Force-delete default branch from inside its worktree writes cd path

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Create another branch for cd target
    run: git-worktree-checkout -b feature/other
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Force-delete default branch from inside its worktree
    run: |
      cd $WORK_DIR/test-repo/main
      cd_file=$(mktemp)
      DAFT_CD_FILE="$cd_file" git-worktree-branch-delete -D main 2>&1
      exit_code=$?
      cat "$cd_file" > $WORK_DIR/cd_target.txt
      rm -f "$cd_file"
      exit $exit_code
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Verify cd file was written
    run: test -s "$WORK_DIR/cd_target.txt" && echo "CD_WRITTEN"
    expect:
      output_contains:
        - "CD_WRITTEN"

  - name: Verify local branch ref still exists
    run: |
      cd $WORK_DIR/test-repo/feature/other
      git branch | grep " main$" && echo "BRANCH_EXISTS"
    expect:
      output_contains:
        - "BRANCH_EXISTS"
