name: Branch delete by absolute path
description: Delete by absolute worktree path resolves to correct branch

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone and create feature branch
    run: |
      git-worktree-clone $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/abs-path
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/abs-path"

  - name: Commit, push, and merge into main
    run: |
      cd $WORK_DIR/test-repo/feature/abs-path
      echo "work" > work.txt
      git add work.txt
      git commit -m "Add work"
      git push origin feature/abs-path
      cd $WORK_DIR/test-repo/main
      git merge feature/abs-path
      git push origin main
    expect:
      exit_code: 0

  - name: Delete by absolute worktree path
    run: git-worktree-branch-delete "$WORK_DIR/test-repo/feature/abs-path"
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/feature/abs-path"
