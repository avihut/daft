name: Branch without -d/-D fails
description: git-worktree-branch without -d or -D flag fails

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone and create feature branch
    run: |
      git-worktree-clone $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/wb-noflag
    expect:
      exit_code: 0

  - name: Run git-worktree-branch without -d or -D
    run: git-worktree-branch feature/wb-noflag 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/wb-noflag"
