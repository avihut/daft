name: Branch delete nonexistent
description: Fails for nonexistent branch

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Delete nonexistent branch fails
    run: git-worktree-branch-delete nonexistent-branch 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
