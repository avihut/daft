name: push --force-with-lease lands an amended branch a plain push rejects
description:
  "After amending an already-pushed commit, a plain daft push fails
  (non-fast-forward) and --force-with-lease lets it through — the flag is a
  passthrough, no new force semantics."

repos:
  - name: push-fwl-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_PUSH_FWL_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/push-fwl-repo/main"

  - name: Checkout the feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/push-fwl-repo/main"
    expect:
      exit_code: 0

  - name: Commit and push a change
    run: |
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
      echo "first version" > work.txt
      git add work.txt
      git commit -m "First version"
    cwd: "$WORK_DIR/push-fwl-repo/feature/test-feature"
    expect: { exit_code: 0 }

  - name: Push the change
    run: daft push feature/test-feature 2>&1
    cwd: "$WORK_DIR/push-fwl-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Pushed 'feature/test-feature' to 'origin'"

  - name: Amend the pushed commit (local now diverges)
    run: |
      echo "second version" > work.txt
      git add work.txt
      git commit --amend -m "Second version"
    cwd: "$WORK_DIR/push-fwl-repo/feature/test-feature"
    expect: { exit_code: 0 }

  - name: A plain push is rejected as non-fast-forward
    run: daft push feature/test-feature 2>&1
    cwd: "$WORK_DIR/push-fwl-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "Could not push 'feature/test-feature'"

  - name: --force-with-lease lets the amended branch through
    run: daft push --force-with-lease feature/test-feature 2>&1
    cwd: "$WORK_DIR/push-fwl-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Pushed 'feature/test-feature' to 'origin'"

  - name: Remote and local agree
    run: |
      git fetch origin 2>/dev/null
      git rev-list --count origin/feature/test-feature..feature/test-feature
    cwd: "$WORK_DIR/push-fwl-repo/feature/test-feature"
    expect:
      exit_code: 0
      output_contains: ["0"]
