name: push aborts when the repo's pre-push hook rejects
description:
  "A failing pre-push hook gates daft push: the command exits non-zero, the
  hook's output is surfaced, the failure message offers --no-verify, and the
  branch never reaches the remote."

repos:
  - name: push-gate-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_PUSH_GATE_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/push-gate-repo/main"

  - name: Checkout the feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/push-gate-repo/main"
    expect:
      exit_code: 0

  - name: Commit a change on the feature branch
    run: |
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
      echo "gated change" > gated.txt
      git add gated.txt
      git commit -m "Gated change"
    cwd: "$WORK_DIR/push-gate-repo/feature/test-feature"
    expect: { exit_code: 0 }

  - name: Install a failing pre-push hook via core.hooksPath
    run: |
      mkdir -p $WORK_DIR/test-hooks
      printf '#!/bin/sh\necho "GATE SAYS NO" >&2\nexit 1\n' > $WORK_DIR/test-hooks/pre-push
      chmod +x $WORK_DIR/test-hooks/pre-push
      git config core.hooksPath $WORK_DIR/test-hooks
    cwd: "$WORK_DIR/push-gate-repo/main"
    expect: { exit_code: 0 }

  - name: The push is rejected with the hook's output surfaced
    run: daft push feature/test-feature 2>&1
    cwd: "$WORK_DIR/push-gate-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "GATE SAYS NO"
        - "pre-push hook"
        - "--no-verify"

  - name: The branch never reached the remote
    run: |
      git fetch origin 2>/dev/null
      git rev-list --count origin/feature/test-feature..feature/test-feature
    cwd: "$WORK_DIR/push-gate-repo/feature/test-feature"
    expect:
      exit_code: 0
      output_contains: ["1"]
