name: Layout persists from clone to checkout
description:
  Verify the layout choice persists from clone to checkout without needing to
  re-specify the --layout flag

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Create worktree without --layout flag
    run: git-worktree-checkout -b feature/test
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/feature/test"
          branch: feature/test
