name: Transform contained to sibling from linked worktree
description:
  Clone with contained layout, create a worktree, then transform to sibling from
  inside the non-default branch worktree. The default branch should become the
  repo root, other worktrees become siblings.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone contained and create a worktree
    run: |
      git-worktree-clone --layout contained $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo/main
      git-worktree-checkout -b feature/test
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
        - "$WORK_DIR/test-repo/feature/test"

  - name: Transform to sibling from the non-default worktree
    run: daft layout transform sibling 2>&1
    cwd: "$WORK_DIR/test-repo/feature/test"
    expect:
      exit_code: 0
      output_contains:
        - "sibling"

  - name: Verify repo is non-bare with sibling worktree
    run: "true"
    expect:
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
        - "$WORK_DIR/test-repo.feature-test"
      files_not_exist:
        - "$WORK_DIR/test-repo/main"
        - "$WORK_DIR/test-repo/feature/test"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo"
          branch: main
        - dir: "$WORK_DIR/test-repo.feature-test"
          branch: feature/test
