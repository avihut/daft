name: Worktree at custom path
description:
  Clone with contained layout, then create a worktree with --at flag at a custom
  path

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Create worktree at custom location
    run: git-worktree-checkout -b feature/test --at $WORK_DIR/custom-location
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/custom-location"
      is_git_worktree:
        - dir: "$WORK_DIR/custom-location"
          branch: feature/test

  - name: List worktrees shows custom location
    run: NO_COLOR=1 git-worktree-list 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "main"
        - "feature/test"
