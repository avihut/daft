name: Custom layout template from global config
description:
  A custom layout defined in global config should work for clone and checkout.
  Non-bare custom layouts create a normal repo; worktrees go to template paths.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Set up custom layout in global config
    run: |
      mkdir -p $DAFT_CONFIG_DIR
      cat > $DAFT_CONFIG_DIR/config.toml << 'TOML'
      [layouts.my-team]
      template = "{{ repo }}/.trees/{{ branch | sanitize }}"
      TOML
    expect:
      exit_code: 0

  - name: Clone with custom layout
    run: git-worktree-clone --layout my-team $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"

  - name: Verify layout show reports custom name
    run: NO_COLOR=1 daft layout show 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_contains:
        - "my-team"

  - name: Create worktree to verify custom path
    run: |
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/test 2>&1
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/.trees/feature-test"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/.trees/feature-test"
          branch: feature/test
