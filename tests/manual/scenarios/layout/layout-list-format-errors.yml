name: Layout list format error cases
description: Invalid format values and flag conflicts are rejected

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: --format bogus is rejected by clap
    run: daft layout list --format bogus 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 2
      output_contains:
        - "invalid value"

  - name: --format and --template conflict
    run: "daft layout list --format json --template 'x' 2>&1"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 2
      output_contains:
        - "cannot be used with"
