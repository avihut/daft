name: Transform to default resolves system default
description:
  The reserved name "default" should resolve to the system default layout
  (sibling) and transform the repo accordingly.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Transform to default
    run: daft layout transform default 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "sibling"

  - name: Verify repo is now sibling layout
    run: NO_COLOR=1 daft layout show 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_contains:
        - "sibling"
