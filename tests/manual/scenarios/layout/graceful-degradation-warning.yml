name: Graceful degradation warns on bare layout with non-bare repo
description:
  When a layout implies bare but the repo is non-bare (e.g., a regular git clone
  with global config set to contained), daft should warn but still create the
  worktree.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Set global default to contained (bare-requiring)
    run: |
      mkdir -p $DAFT_CONFIG_DIR
      cat > $DAFT_CONFIG_DIR/config.toml << 'TOML'
      [defaults]
      layout = "contained"
      TOML
    expect:
      exit_code: 0

  - name: Create a regular non-bare git clone (not daft clone)
    run: |
      git clone $REMOTE_TEST_REPO test-repo
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/.git"

  - name: Create worktree with daft on non-bare repo with bare-requiring layout
    run: |
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/test 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "works best with a bare"
