name: "Transform nested to contained-flat"
description: "Matrix test: nested -> contained-flat"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with nested layout
    run: git-worktree-clone --layout nested $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Transform to contained-flat
    run: daft layout transform contained-flat 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_contains:
        - "Transformed"

  - name: Verify structure
    run: |
      cd $WORK_DIR/test-repo/main && git status --porcelain > /tmp/daft-status-main 2>&1
      cd $WORK_DIR/test-repo/develop && git status --porcelain > /tmp/daft-status-develop 2>&1
      cat /tmp/daft-status-main /tmp/daft-status-develop
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
        - "$WORK_DIR/test-repo/develop"
      files_exist:
        - "$WORK_DIR/test-repo/main/README.md"
        - "$WORK_DIR/test-repo/develop/README.md"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main
        - dir: "$WORK_DIR/test-repo/develop"
          branch: develop
