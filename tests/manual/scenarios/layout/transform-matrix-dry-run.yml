name: "Transform dry-run shows plan without making changes"
description: "Dry-run transform should print plan but not move any worktrees"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Dry-run transform to sibling
    run: daft layout transform sibling --dry-run 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Transform plan"

  - name: Verify original paths unchanged
    run: "true"
    expect:
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
        - "$WORK_DIR/test-repo/develop"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main
        - dir: "$WORK_DIR/test-repo/develop"
          branch: develop
