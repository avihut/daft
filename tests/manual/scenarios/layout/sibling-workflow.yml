name: Sibling layout workflow
description:
  Clone with sibling layout, create a worktree, verify it lands as a sibling
  directory

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with sibling layout
    run: git-worktree-clone --layout sibling $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo"
          branch: main

  - name: Create worktree for new branch
    run: git-worktree-checkout -b feature/test
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo.feature-test"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo.feature-test"
          branch: feature/test

  - name: List worktrees shows both
    run: NO_COLOR=1 git-worktree-list 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_contains:
        - "main"
        - "feature/test"
