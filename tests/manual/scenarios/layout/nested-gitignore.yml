name: Nested layout auto-gitignore
description: Verify auto-gitignore for nested layout is created and idempotent

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with nested layout
    run: git-worktree-clone --layout nested $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"

  - name: Create first worktree
    run: git-worktree-checkout -b feature/first
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/.worktrees/feature-first"

  - name: Verify .gitignore contains .worktrees/
    run: cat .gitignore
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/.gitignore"
          content: ".worktrees/"

  - name: Create second worktree
    run: git-worktree-checkout -b feature/second
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/.worktrees/feature-second"

  - name: Verify .gitignore has only one .worktrees/ entry
    run: grep -c '.worktrees/' .gitignore
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_contains:
        - "1"
