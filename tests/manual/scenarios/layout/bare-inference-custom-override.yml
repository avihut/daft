name: Custom layout with bare override
description:
  A custom layout whose template would normally infer bare can override with
  bare=false. The repo should be cloned as non-bare.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Set up custom layout with bare=false override
    run: |
      mkdir -p $DAFT_CONFIG_DIR
      cat > $DAFT_CONFIG_DIR/config.toml << 'TOML'
      [layouts.inside-nonbare]
      template = "{{ repo_path }}/worktrees/{{ branch | sanitize }}"
      bare = false
      TOML
    expect:
      exit_code: 0

  - name: Clone with the custom layout
    run: git-worktree-clone --layout inside-nonbare $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0

  - name: Verify repo is non-bare despite repo_path prefix template
    run: "true"
    expect:
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo"
          branch: main
