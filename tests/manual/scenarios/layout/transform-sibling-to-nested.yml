name: Transform sibling to nested
description:
  Transform between two non-bare layouts. Worktrees should move from sibling
  positions to .worktrees/ subdirectory. No bare transition needed.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone sibling and create a worktree
    run: |
      git-worktree-clone --layout sibling $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/test
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo.feature-test"

  - name: Transform to nested layout
    run: daft layout transform nested 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_contains:
        - "nested"

  - name: Verify worktrees moved to .worktrees/ subdirectory
    run: "true"
    expect:
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
        - "$WORK_DIR/test-repo/.worktrees/feature-test"
      files_not_exist:
        - "$WORK_DIR/test-repo.feature-test"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo"
          branch: main
        - dir: "$WORK_DIR/test-repo/.worktrees/feature-test"
          branch: feature/test

  - name: Verify .gitignore updated
    run: cat $WORK_DIR/test-repo/.gitignore 2>&1
    expect:
      exit_code: 0
      output_contains:
        - ".worktrees/"
