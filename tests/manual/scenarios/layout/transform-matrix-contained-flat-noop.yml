name: "Transform contained-flat to contained-flat (no-op)"
description: "Same-layout transform should be a no-op"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained-flat layout
    run: git-worktree-clone --layout contained-flat $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Transform to same layout
    run: daft layout transform contained-flat 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify unchanged
    run: "true"
    expect:
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
        - "$WORK_DIR/test-repo/develop"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main
        - dir: "$WORK_DIR/test-repo/develop"
          branch: develop
