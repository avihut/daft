name: Layout show
description: daft layout show displays the resolved layout for a repo

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Show layout from inside worktree
    cwd: "$WORK_DIR/test-repo/main"
    run: daft layout show
    expect:
      exit_code: 0
      output_contains:
        - "contained"
