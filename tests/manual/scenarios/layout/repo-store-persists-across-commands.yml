name: Repo store layout persists across commands
description:
  Layout stored in repos.json after clone should persist and be used by
  subsequent checkout commands. Transforming updates the stored layout.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Verify layout show reports contained from repo setting
    run: NO_COLOR=1 daft layout show 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "contained"
        - "repo setting"

  - name: Create worktree without layout flag uses stored layout
    run: |
      cd $WORK_DIR/test-repo/main
      git-worktree-checkout -b feature/test 2>&1
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test"

  - name: Transform to sibling
    run: daft layout transform sibling 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify layout show now reports sibling
    run: NO_COLOR=1 daft layout show 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_contains:
        - "sibling"
        - "repo setting"

  - name: Create another worktree uses new layout
    run: |
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/new-work 2>&1
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo.feature-new-work"
