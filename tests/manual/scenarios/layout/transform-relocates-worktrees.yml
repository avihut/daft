name: Transform relocates existing worktrees
description:
  Clone with sibling layout, create a worktree, then transform to contained. The
  sibling worktree should be relocated inside the project root.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone sibling and create a worktree
    run: |
      git-worktree-clone --layout sibling $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/test
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo.feature-test"

  - name: Transform to contained layout
    run: daft layout transform contained 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_contains:
        - "contained"

  - name: Verify worktree relocated inside project root
    run: "true"
    expect:
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
        - "$WORK_DIR/test-repo/feature/test"
      files_not_exist:
        - "$WORK_DIR/test-repo.feature-test"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main
        - dir: "$WORK_DIR/test-repo/feature/test"
          branch: feature/test
