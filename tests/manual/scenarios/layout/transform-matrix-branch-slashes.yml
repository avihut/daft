name: "Transform sanitizes branch slashes (contained to contained-flat)"
description:
  "Branch names with slashes create nested dirs in contained; contained-flat
  should sanitize to a flat name"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout feature/test-feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Transform to contained-flat
    run: daft layout transform contained-flat 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Transformed"

  - name: Verify flat sanitized path
    run: |
      cd $WORK_DIR/test-repo/main && git status --porcelain > /tmp/daft-status-main 2>&1
      cd $WORK_DIR/test-repo/feature-test-feature && git status --porcelain > /tmp/daft-status-feature 2>&1
      cat /tmp/daft-status-main /tmp/daft-status-feature
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
        - "$WORK_DIR/test-repo/feature-test-feature"
      files_exist:
        - "$WORK_DIR/test-repo/main/README.md"
        - "$WORK_DIR/test-repo/feature-test-feature/README.md"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main
        - dir: "$WORK_DIR/test-repo/feature-test-feature"
          branch: feature/test-feature
