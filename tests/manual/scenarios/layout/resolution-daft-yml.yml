name: daft.yml layout stored in repos.json after clone
description:
  When a cloned repo has daft.yml with a layout field and no --layout flag was
  given, the layout should be stored in repos.json and used for subsequent
  checkouts.

repos:
  - name: test-repo
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# test-repo"
        commits:
          - message: "Initial commit"
    daft_yml: |
      layout: contained

steps:
  - name: Clone without --layout flag (repo has daft.yml with contained)
    run: git-worktree-clone $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0

  - name: Verify layout show reports contained from repo setting
    run: NO_COLOR=1 daft layout show 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "contained"
