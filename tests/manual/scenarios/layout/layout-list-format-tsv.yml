name: Layout list TSV format
description: daft layout list --format tsv emits tab-separated layout rows

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: TSV output has header with column names
    run: daft layout list --format tsv 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "name"
        - "template"
        - "is_default"
        - "contained"
