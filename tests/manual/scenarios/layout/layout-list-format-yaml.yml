name: Layout list YAML format
description: daft layout list --format yaml emits all layouts as YAML

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: YAML output has expected fields
    run: daft layout list --format yaml 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "- name:"
        - "template:"
        - "contained"
