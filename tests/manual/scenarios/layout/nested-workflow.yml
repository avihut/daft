name: Nested layout workflow
description:
  Clone with nested layout, create a worktree, verify it lands in .worktrees/

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with nested layout
    run: git-worktree-clone --layout nested $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo"
          branch: main

  - name: Create worktree for new branch
    run: git-worktree-checkout -b feature/test
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/.worktrees/feature-test"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/.worktrees/feature-test"
          branch: feature/test

  - name: Verify .gitignore contains .worktrees/
    run: cat .gitignore
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/.gitignore"
          content: ".worktrees/"
