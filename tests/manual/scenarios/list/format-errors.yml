name: List format error cases
description: --format rejects invalid values; --json is removed

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: --json is removed
    run: git-worktree-list --json 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 2
      output_contains:
        - "unexpected argument"

  - name: --format bogus is rejected
    run: git-worktree-list --format bogus 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 2
      output_contains:
        - "invalid value"

  - name: --format and --template conflict
    run: "git-worktree-list --format json --template 'x' 2>&1"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 2
      output_contains:
        - "cannot be used with"
