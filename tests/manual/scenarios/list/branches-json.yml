name: Branches JSON
description: JSON with -b includes "kind" field

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a local branch without worktree
    run: |
      cd $WORK_DIR/test-repo/main
      git branch no-worktree-branch
    expect:
      exit_code: 0

  - name: JSON with -b includes kind field
    run: git-worktree-list -b --json 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - '"kind"'
        - '"kind": "worktree"'
        - '"kind": "branch"'
        - '"path": null'
