name: List template format
description: --template renders a Tera template with worktree items

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Template iterates items and emits pipe-separated names
    run:
      "git-worktree-list --template '{% for r in items %}{{ r.name }}|{% endfor
      %}' 2>&1"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "|"
