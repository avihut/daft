name: Columns JSON filtering
description: --columns flag filters JSON output keys

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: JSON with subset of columns
    run: git-worktree-list --json --columns branch,path 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - '"name"'
        - '"path"'
        - '"kind"'
      output_not_contains:
        - '"ahead"'
        - '"behind"'
        - '"staged"'
        - '"remote_ahead"'
        - '"branch_age"'
        - '"last_commit_age"'
        - '"is_current"'

  - name: JSON without --columns shows all fields
    run: git-worktree-list --json 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - '"name"'
        - '"ahead"'
        - '"staged"'
        - '"branch_age"'
