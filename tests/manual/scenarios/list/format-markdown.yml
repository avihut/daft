name: List Markdown format
description: --format markdown emits a GitHub-flavored markdown table

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Markdown output has table header and separator row
    run: git-worktree-list --format markdown 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "| kind |"
        - "| --- |"
