name: Branches flag
description: -b flag shows local branches without worktrees

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a local branch without a worktree
    run: |
      cd $WORK_DIR/test-repo/main
      git branch no-worktree-branch
    expect:
      exit_code: 0

  - name: Default list does not show non-worktree branches
    run: NO_COLOR=1 git-worktree-list 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_not_contains:
        - "no-worktree-branch"

  - name: List with -b shows the extra branch
    run: NO_COLOR=1 git-worktree-list -b 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "no-worktree-branch"
        - "main"
