name: List owner column
description: Owner column shows commit author name for each worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Set local user identity
    run: |
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Checkout develop and make a commit as current user
    run: |
      git-worktree-checkout develop
      cd $WORK_DIR/test-repo/develop
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
      echo "owned change" >> README.md
      git add README.md
      GIT_AUTHOR_NAME="Me Testuser" GIT_AUTHOR_EMAIL="me@example.com" \
      GIT_COMMITTER_NAME="Me Testuser" GIT_COMMITTER_EMAIL="me@example.com" \
        git commit -m "Owned commit"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: List with owner column shows author name
    run: NO_COLOR=1 git-worktree-list --columns branch,owner 2>&1
    cwd: "$WORK_DIR/test-repo/develop"
    expect:
      exit_code: 0
      output_contains:
        - "Owner"
        - "Me Testuser"
      output_not_contains:
        - "me@example.com"
