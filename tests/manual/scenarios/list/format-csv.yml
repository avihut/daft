name: List CSV format
description: --format csv emits RFC 4180 comma-separated rows

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: CSV has header row with comma-separated column names
    run: git-worktree-list --format csv 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "kind,name"
        - "worktree"

  - name: --no-headers omits header row
    run: git-worktree-list --format csv --no-headers 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_not_contains:
        - "kind,name"
