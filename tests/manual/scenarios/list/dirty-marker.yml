name: Dirty worktree marker
description: Dirty worktrees show change indicators (-N)

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Make uncommitted changes in develop
    run: echo "dirty change" >> $WORK_DIR/test-repo/develop/README.md
    expect:
      exit_code: 0

  - name: List shows dirty indicator for develop
    run: NO_COLOR=1 git-worktree-list 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "-"
