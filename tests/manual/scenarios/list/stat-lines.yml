name: Stat lines mode
description: --stat lines shows line counts instead of file counts

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop and add file with known line count
    run: |
      cd $WORK_DIR/test-repo
      git-worktree-checkout develop
      cd $WORK_DIR/test-repo/develop
      printf "line1\nline2\nline3\n" > newfile.txt
      git add newfile.txt
      git commit -m "Add 3 lines"
    expect:
      exit_code: 0

  - name: List with --stat lines shows line counts
    run: NO_COLOR=1 git-worktree-list --stat lines 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "+"
