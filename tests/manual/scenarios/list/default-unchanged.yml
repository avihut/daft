name: Default list unchanged
description: Default list does not show non-worktree branches (regression test)

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create local branch without worktree
    run: |
      cd $WORK_DIR/test-repo/main
      git branch hidden-branch
    expect:
      exit_code: 0

  - name: Default list does not show non-worktree branch
    run: NO_COLOR=1 git-worktree-list 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "main"
      output_not_contains:
        - "hidden-branch"
