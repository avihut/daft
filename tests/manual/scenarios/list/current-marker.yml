name: Current worktree marker
description: Current worktree has > marker in list output

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: List from develop shows > marker on develop
    run: NO_COLOR=1 git-worktree-list 2>&1
    cwd: "$WORK_DIR/test-repo/develop"
    expect:
      exit_code: 0
      output_contains:
        - ">"

  - name: List from main shows > marker on main
    run: NO_COLOR=1 git-worktree-list 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - ">"

  # Piped output takes the blocking renderer; forcing colors must paint the
  # current worktree's row with the same dark-gray background (48;5;235) the
  # live table applies, and only that row.
  - name: Colored blocking output highlights the current row
    run:
      CLICOLOR_FORCE=1 git-worktree-list 2>/dev/null | grep -c "48;5;235" |
      xargs test 1 -eq && echo ONE_ROW_HIGHLIGHTED
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "ONE_ROW_HIGHLIGHTED"
