name: List YAML format
description: --format yaml emits YAML block sequence

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: YAML output has block sequence with expected fields
    run: git-worktree-list --format yaml 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "- kind:"
        - "name:"
        - "worktree"
