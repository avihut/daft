name: JSON ahead/behind
description: JSON shows non-zero ahead count for diverged worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop and make commits ahead of main
    run: |
      cd $WORK_DIR/test-repo
      git-worktree-checkout develop
      cd $WORK_DIR/test-repo/develop
      echo "ahead" > ahead.txt
      git add ahead.txt
      git commit -m "Ahead commit"
    expect:
      exit_code: 0

  - name: JSON shows non-zero ahead count for develop
    run: git-worktree-list --json 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - '"ahead"'
        - '"name": "develop"'
