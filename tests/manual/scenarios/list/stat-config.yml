name: Stat config
description: daft.list.stat config sets default statistics mode

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop and add file with known line count
    run: |
      cd $WORK_DIR/test-repo
      git-worktree-checkout develop
      cd $WORK_DIR/test-repo/develop
      printf "line1\nline2\nline3\n" > newfile.txt
      git add newfile.txt
      git commit -m "Add 3 lines"
    expect:
      exit_code: 0

  - name: Set config to lines mode
    run: git config daft.list.stat lines
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: List without --stat flag uses config
    run: NO_COLOR=1 git-worktree-list 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "+"

  - name: Explicit --stat summary overrides config
    run: NO_COLOR=1 git-worktree-list --stat summary 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Invalid config value falls back to default
    run: |
      cd $WORK_DIR/test-repo/main
      git config daft.list.stat invalid
      NO_COLOR=1 git-worktree-list 2>&1
    expect:
      exit_code: 0
