name: List from subdirectory
description: Works from inside a worktree subdirectory

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Create deep subdirectory and list from there
    run:
      mkdir -p $WORK_DIR/test-repo/main/subdir/deep && cd
      $WORK_DIR/test-repo/main/subdir/deep && NO_COLOR=1 git-worktree-list 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "main"
        - "develop"
