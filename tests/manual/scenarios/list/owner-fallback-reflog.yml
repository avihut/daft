name: List owner fallback via reflog
description:
  "A freshly-created branch with no commits diverging from base falls back to
  the reflog creator identity for the Owner column."

repos:
  - name: reflog-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_REFLOG_REPO
    expect:
      exit_code: 0

  - name: Configure user identity
    run: |
      git config user.email "creator@example.com"
      git config user.name "Creator Person"
    cwd: "$WORK_DIR/reflog-repo/main"
    expect:
      exit_code: 0

  - name: Create a new branch with zero divergent commits
    run: |
      GIT_COMMITTER_NAME="Creator Person" GIT_COMMITTER_EMAIL="creator@example.com" \
        git branch feature/fresh
    cwd: "$WORK_DIR/reflog-repo/main"
    expect:
      exit_code: 0

  - name: Owner column shows the reflog creator for the fresh branch
    run: NO_COLOR=1 git-worktree-list --branches --columns branch,owner 2>&1
    cwd: "$WORK_DIR/reflog-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "feature/fresh"
        - "Creator Person"
