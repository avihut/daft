name: JSON output
description: JSON output contains required fields

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop and make dirty changes
    run: |
      cd $WORK_DIR/test-repo &&
      git-worktree-checkout develop &&
      echo "dirty" >> $WORK_DIR/test-repo/develop/README.md
    expect:
      exit_code: 0

  - name: JSON output contains all required fields
    run: git-worktree-list --json 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - '"name"'
        - '"path"'
        - '"is_current"'
        - '"is_default_branch"'
        - '"ahead"'
        - '"behind"'
        - '"staged"'
        - '"unstaged"'
        - '"untracked"'
        - '"remote_ahead"'
        - '"remote_behind"'
        - '"last_commit_age"'
        - '"last_commit_subject"'
        - '"branch_age"'
