name: "Exec checkout single"
description: "Single -x command runs in checkout worktree directory"

repos:
  - name: test-repo-exec-co
    use_fixture: standard-remote

steps:
  - name: "Clone the repository"
    run: "git-worktree-clone $REMOTE_TEST_REPO_EXEC_CO"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo-exec-co/main"

  - name: "Checkout develop with -x command"
    run: "git-worktree-checkout develop -x 'pwd > exec_output.txt'"
    cwd: "$WORK_DIR/test-repo-exec-co/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo-exec-co/develop/exec_output.txt"
      file_contains:
        - path: "$WORK_DIR/test-repo-exec-co/develop/exec_output.txt"
          content: "test-repo-exec-co/develop"
