name: "Exec failing command"
description: "Failing -x command stops execution and propagates error"

steps:
  - name: "Init repo with failing -x command"
    run:
      "git-worktree-init --layout contained -x 'echo before > marker.txt' -x
      'false' -x 'echo after >> marker.txt' exec-fail-repo 2>/dev/null"
    expect:
      files_exist:
        - "$WORK_DIR/exec-fail-repo/master/marker.txt"
      file_not_contains:
        - path: "$WORK_DIR/exec-fail-repo/master/marker.txt"
          content: "after"
