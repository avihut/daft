name: Install reports a tracked daft.yml as a team baseline
description: >
  When the existing daft.yml is committed (tracked), `daft install` reports it
  as a team baseline, points the user at daft.local.yml for personal overrides,
  and exits 0 without modifying it.

steps:
  - name: Initialize a fresh contained-layout repo
    run: git-worktree-init --layout contained test-repo
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/master"

  - name: Commit a daft.yml so it is tracked
    run: |
      echo "# committed team baseline" > daft.yml &&
      git add daft.yml &&
      git commit -m "Add daft.yml"
    cwd: "$WORK_DIR/test-repo/master"
    expect:
      exit_code: 0

  - name: Run daft install — it reports the tracked baseline and stops
    run: daft install 2>&1
    cwd: "$WORK_DIR/test-repo/master"
    expect:
      exit_code: 0
      output_contains:
        - "already exists"
        - "tracked"
        - "daft.local.yml"
      file_contains:
        - path: "$WORK_DIR/test-repo/master/daft.yml"
          content: "# committed team baseline"
