name: Install honors the -C flag (alias)
description:
  Regression — the top-level `daft install` alias must read the -C-stripped
  argv. `daft -C <dir> install` from a different cwd writes daft.yml into the -C
  target. Before the fix the alias re-parsed the already-consumed `-C <path>`
  pair and exited 2.

steps:
  - name: Initialize a fresh repo
    run: git-worktree-init --layout contained test-repo
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/master"

  - name: Run `daft -C <worktree> install` from the parent directory
    run: daft -C "$WORK_DIR/test-repo/master" install 2>&1
    cwd: "$WORK_DIR"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/master/daft.yml"
      file_contains:
        - path: "$WORK_DIR/test-repo/master/daft.yml"
          content: "# daft.yml — per-repo daft configuration."
