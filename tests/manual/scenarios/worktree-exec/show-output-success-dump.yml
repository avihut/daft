name: "Exec -v dumps successful captured output"
description:
  "With -v, every worktree (including those that succeeded) gets a ✓-headed
  block with its captured stdout reproduced in the gutter. Without the flag the
  same run prints only the summary rows."

repos:
  - name: exec-show
    use_fixture: standard-remote

steps:
  - name: "Clone the repository"
    run: "git-worktree-clone --layout contained $REMOTE_EXEC_SHOW"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/exec-show/main"

  - name: "Create feat-a worktree"
    run: "git-worktree-checkout -b feat-a"
    cwd: "$WORK_DIR/exec-show/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/exec-show/feat-a"

  - name: "Without -v: no per-branch capture is dumped"
    run: "git-worktree-exec --all -- sh -c 'echo marker-success' 2>&1"
    cwd: "$WORK_DIR/exec-show/main"
    expect:
      exit_code: 0
      output_not_contains:
        - "│ marker-success"
        - "succeeded,"

  - name: "With -v: every successful worktree gets a ✓ block with its output"
    run: "git-worktree-exec --all -v -- sh -c 'echo marker-success' 2>&1"
    cwd: "$WORK_DIR/exec-show/main"
    expect:
      exit_code: 0
      output_contains:
        - "✓ feat-a"
        - "✓ main"
        - "succeeded,"
        - "exit 0"
        - "│ marker-success"
