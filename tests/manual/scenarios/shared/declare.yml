name: Shared add --declare
description: --declare adds to daft.yml without requiring file to exist

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Declare .env as shared
    run: daft shared add --declare .env
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify daft.yml has .env
    run: "true"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/daft.yml"
          content: ".env"

  - name: Verify .gitignore has .env
    run: "true"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/.gitignore"
          content: ".env"

  - name: Verify no file was created in worktree
    run: test ! -e .env
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
