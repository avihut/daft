name: Shared status template format
description: daft shared status --template renders shared file data via Tera

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Add a shared file
    run: |
      echo "SECRET=yes" > .env
      daft shared add .env
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Template renders shared path data
    run: "daft shared status --template '{{ path | json_encode() }}' 2>&1"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - ".env"
