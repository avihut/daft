name: Shared status YAML format
description: daft shared status --format yaml emits shared file status as YAML

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained layout
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Add a shared file
    run: |
      echo "SECRET=yes" > .env
      daft shared add .env
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: YAML output has path field
    run: daft shared status --format yaml 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "path:"
        - ".env"
