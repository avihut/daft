name: Shared add basic
description: daft shared add collects a file and creates symlink

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create an untracked .env file
    run: echo "SECRET=test" > .env
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Share the .env file
    run: daft shared add .env
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify .env is now a symlink
    run: test -L .env
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify .env content via symlink
    run: "true"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/main/.env"
          content: "SECRET=test"

  - name: Verify shared storage has the file
    run: "true"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/.git/.daft/shared/.env"
          content: "SECRET=test"

  - name: Verify daft.yml was updated
    run: "true"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/daft.yml"
          content: ".env"
