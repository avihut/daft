name: Config checkout push false
description: daft.checkout.push=false disables push on checkout

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Set config to disable push
    run: git config daft.checkout.push false
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Create a new branch with push disabled
    run: git-worktree-checkout -b feature/no-push 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/no-push"

  - name: Verify branch was not pushed to remote
    run: |
      result=$(git ls-remote --heads origin feature/no-push 2>/dev/null)
      test -z "$result"
    cwd: "$WORK_DIR/test-repo/feature/no-push"
    expect:
      exit_code: 0
