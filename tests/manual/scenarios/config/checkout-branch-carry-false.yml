name: Config checkout-branch carry false
description: daft.checkoutBranch.carry=false disables carry for new branches

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Set carry config to false for checkout-branch
    run: git config daft.checkoutBranch.carry false
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Create uncommitted changes in main
    run: echo "uncommitted content" > $WORK_DIR/test-repo/main/uncommitted.txt

  - name: Create new branch (carry should be disabled by config)
    run: git-worktree-checkout -b feature/no-carry-config
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/feature/no-carry-config/uncommitted.txt"
      files_exist:
        - "$WORK_DIR/test-repo/main/uncommitted.txt"
