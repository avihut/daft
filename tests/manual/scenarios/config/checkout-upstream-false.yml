name: Config checkout upstream false
description: daft.checkout.upstream=false disables upstream setup

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Set upstream config to false
    run: git config daft.checkout.upstream false
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Checkout existing remote branch
    run: git-worktree-checkout develop 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"

  - name: Verify upstream was not set
    run: |
      result=$(git config branch.develop.remote 2>/dev/null || true)
      test -z "$result" && echo "NO_UPSTREAM"
    cwd: "$WORK_DIR/test-repo/develop"
    expect:
      exit_code: 0
      output_contains:
        - "NO_UPSTREAM"
