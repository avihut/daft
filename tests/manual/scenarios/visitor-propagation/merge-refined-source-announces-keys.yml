name:
  Merging a branch with a refined daft.yml consolidates and announces the keys
description: >
  feat/x refined its visitor daft.yml (added a named job) while main's copy
  stayed at the seeded version. `daft merge feat/x` brings the refinement into
  main's daft.yml - that mirrors what merging a committed daft.yml would do -
  but it must be announced, naming the file and the adopted keys (issue #628).

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Ignore daft files and push so new worktrees inherit the ignore
    run: |
      cd $WORK_DIR/test-repo/main
      printf 'daft.yml\ndaft.local.yml\n' > .gitignore
      git add .gitignore
      git commit -m "ignore untracked daft files"
      git push origin main
    expect:
      exit_code: 0

  - name: Write visitor daft.yml version A in main
    run: >
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name:
      setup\n        run: echo setup-v1\n' > $WORK_DIR/test-repo/main/daft.yml
    expect:
      exit_code: 0

  - name: Create feature worktree (seeds a copy of A)
    run: git-worktree-checkout -b feat/x
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/feat/x/daft.yml"
          content: "setup-v1"

  - name: Commit feature work on feat/x
    run: |
      cd $WORK_DIR/test-repo/feat/x
      printf 'feature work\n' > feature.txt
      git add feature.txt
      git commit -m "feature work"
    expect:
      exit_code: 0

  - name: Refine feat/x's daft.yml with an extra named job
    run: >
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name:
      setup\n        run: echo setup-v1\n      - name: extra\n        run: echo
      extra-job\n' > $WORK_DIR/test-repo/feat/x/daft.yml
    expect:
      exit_code: 0

  - name: Merge feat/x into main announces the consolidation
    run: daft merge --no-edit feat/x 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Consolidated daft.yml"
        - "extra"

  - name: main's daft.yml gained the refinement and kept its own content
    run: cat $WORK_DIR/test-repo/main/daft.yml
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "extra-job"
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "setup-v1"
