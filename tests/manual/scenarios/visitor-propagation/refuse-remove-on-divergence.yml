name: Refuse worktree removal when untracked daft files diverge
description: >
  When a worktree has a daft.local.yml (gitignored personal overlay) the merge
  target lacks, branch-delete refuses removal. The file was written after the
  worktree was created, so it has no seed provenance (NoSeed) and is treated
  like a refinement. Passing -D (--force) discards it to .daft/discarded/ and
  removes the worktree without ever writing the merge target.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Create feature branch worktree
    run: git-worktree-checkout -b feat/x
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feat/x"

  - name:
      Add .gitignore that ignores daft.local.yml and commit + merge into main
    run: |
      cd $WORK_DIR/test-repo/feat/x
      printf 'daft.local.yml\n' > .gitignore
      git add .gitignore
      git commit -m "gitignore daft.local.yml"
      cd $WORK_DIR/test-repo/main
      git merge feat/x
    expect:
      exit_code: 0

  - name: Write daft.local.yml only in feat/x (gitignored, not present in main)
    run: |
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name: personal\n        run: echo my-local-config\n' \
        > $WORK_DIR/test-repo/feat/x/daft.local.yml
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/feat/x/daft.local.yml"

  - name: Attempt to delete feat/x without force should fail
    run: git-worktree-branch-delete feat/x 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
      output_contains:
        - "refined daft files"
        - "daft file merge"
      dirs_exist:
        - "$WORK_DIR/test-repo/feat/x"

  - name: Delete feat/x with -D force discards to the stash
    run: git-worktree-branch-delete -D feat/x 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/feat/x"
        - "$WORK_DIR/test-repo/main/daft.local.yml"
      files_exist:
        - "$WORK_DIR/test-repo/.git/.daft/discarded/feat/x/daft.local.yml"
      output_contains:
        - "Discarded"
