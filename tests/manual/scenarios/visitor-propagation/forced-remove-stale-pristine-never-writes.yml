name: Forced remove of a stale pristine worktree never writes the target
description: >
  main's visitor daft.yml evolves A -> B after feat/x was seeded with A.
  feat/x's copy was never edited (pristine). A forced removal must simply delete
  the worktree: main's daft.yml stays at B. Regression for the
  salvage-propagation bug where the stale seeded copy A silently overwrote the
  evolved B (issue #628).

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Ignore daft files and push so new worktrees inherit the ignore
    run: |
      cd $WORK_DIR/test-repo/main
      printf 'daft.yml\ndaft.local.yml\n' > .gitignore
      git add .gitignore
      git commit -m "ignore untracked daft files"
      git push origin main
    expect:
      exit_code: 0

  - name: Write visitor daft.yml version A in main
    run: >
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name:
      setup\n        run: echo setup-v1\n' > $WORK_DIR/test-repo/main/daft.yml
    expect:
      exit_code: 0

  - name: Create feature worktree (seeds a copy of A)
    run: git-worktree-checkout -b feat/x
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/feat/x/daft.yml"
          content: "setup-v1"

  - name: Evolve main's daft.yml to version B
    run: >
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name:
      setup\n        run: echo setup-v2\n' > $WORK_DIR/test-repo/main/daft.yml
    expect:
      exit_code: 0

  - name: Force-remove feat/x (stale pristine copy)
    run: daft remove -f feat/x 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Worktree is gone
    run: test ! -d $WORK_DIR/test-repo/feat/x
    expect:
      exit_code: 0

  - name: main's daft.yml still holds version B, not the stale A
    run: cat $WORK_DIR/test-repo/main/daft.yml
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "setup-v2"
      file_not_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "setup-v1"
