name: Interactive removal can consolidate a refined daft.yml into the target
description: >
  feat/x refined its visitor daft.yml (added a named job). An interactive
  unforced `daft remove` shows a summary of the refined keys and offers to
  consolidate; answering "c" merges the refinement into main's daft.yml and then
  removes the worktree. Under DAFT_TESTING the prompt reads from the stdin pipe
  (issue #628).

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Ignore daft files and push so new worktrees inherit the ignore
    run: |
      cd $WORK_DIR/test-repo/main
      printf 'daft.yml\ndaft.local.yml\n' > .gitignore
      git add .gitignore
      git commit -m "ignore untracked daft files"
      git push origin main
    expect:
      exit_code: 0

  - name: Write visitor daft.yml version A in main
    run: >
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name:
      setup\n        run: echo setup-v1\n' > $WORK_DIR/test-repo/main/daft.yml
    expect:
      exit_code: 0

  - name: Create feature worktree (seeds a copy of A)
    run: git-worktree-checkout -b feat/x
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/feat/x/daft.yml"
          content: "setup-v1"

  - name: Refine feat/x's daft.yml with an extra named job
    run: >
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name:
      setup\n        run: echo setup-v1\n      - name: extra\n        run: echo
      extra-job\n' > $WORK_DIR/test-repo/feat/x/daft.yml
    expect:
      exit_code: 0

  - name: Interactive remove consolidates on "c"
    run: printf 'c\n' | daft remove --local feat/x 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "extra"

  - name: Worktree is gone and main's daft.yml gained the refinement
    run: test ! -d $WORK_DIR/test-repo/feat/x
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "extra-job"
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "setup-v1"
