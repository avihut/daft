name: Checkout start flag
description: --start creates worktree for nonexistent branch

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout nonexistent branch with --start
    run: git-worktree-checkout --start new-feature-branch
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/new-feature-branch"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/new-feature-branch"
          branch: new-feature-branch
