name: Checkout start shorthand
description: -s shorthand works the same as --start

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout nonexistent branch with -s
    run: git-worktree-checkout -s another-new-branch
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/another-new-branch"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/another-new-branch"
          branch: another-new-branch
