name: Checkout dash deleted previous
description: daft go - errors when previous worktree was deleted

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Go from main to develop to establish previous
    run: cd $WORK_DIR/test-repo/main && git-worktree-checkout develop
    expect:
      exit_code: 0

  - name: Remove the main worktree
    run: |
      git -C $WORK_DIR/test-repo/develop worktree remove --force $WORK_DIR/test-repo/main 2>/dev/null || rm -rf $WORK_DIR/test-repo/main

  - name: Go dash fails because main is gone
    run: git-worktree-checkout -- - 2>&1
    cwd: "$WORK_DIR/test-repo/develop"
    expect:
      exit_code: 1
      output_contains:
        - "no longer exists"
