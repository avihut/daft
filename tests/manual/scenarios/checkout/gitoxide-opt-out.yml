name: Gitoxide opt-out forces the subprocess backend
description: >
  #733: daft.experimental.gitoxide=false is the opt-out — commands must keep
  working on the git-subprocess backend, still without any experimental notice.
  (That the flag genuinely skips every gix path is pinned at the unit level by
  git::tests::gitoxide_opt_out_takes_no_gix_path; the "subprocess" integration
  matrix entry runs the whole suite under this key.)

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Opt out of the gitoxide backend
    run: git config daft.experimental.gitoxide false
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Checkout on the subprocess backend
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      output_not_contains:
        - "[experimental]"
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/develop"
          branch: develop
