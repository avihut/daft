name: Checkout dash no previous
description: daft go - fails when no previous worktree exists

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Go dash with no previous fails
    run: git-worktree-checkout -- - 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
      output_contains:
        - "No previous worktree"
