name: Checkout remote branch
description: Checkout branch that exists on remote

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout remote feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/feature/test-feature"
          branch: feature/test-feature
