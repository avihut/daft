name: Checkout auto-start config
description:
  daft.go.autoStart=true auto-creates worktrees for nonexistent branches

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Set auto-start config
    run: git config daft.go.autoStart true
    cwd: "$WORK_DIR/test-repo"

  - name: Checkout nonexistent branch auto-creates
    run: git-worktree-checkout auto-created-branch
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/auto-created-branch"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/auto-created-branch"
          branch: auto-created-branch
