name: Checkout dash toggle
description: daft go - toggles between two worktrees via DAFT_CD_FILE

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Go from main to develop (saves main as previous)
    run: cd $WORK_DIR/test-repo/main && git-worktree-checkout develop
    expect:
      exit_code: 0

  - name: Go dash from develop navigates to main
    run: |
      cd $WORK_DIR/test-repo/develop
      cd_file=$(mktemp)
      DAFT_CD_FILE="$cd_file" git-worktree-checkout -- - 2>&1
      cat "$cd_file" > $WORK_DIR/cd_target.txt
      rm -f "$cd_file"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/cd_target.txt"
          content: "main"

  - name: Go dash from main navigates to develop
    run: |
      cd $WORK_DIR/test-repo/main
      cd_file=$(mktemp)
      DAFT_CD_FILE="$cd_file" git-worktree-checkout -- - 2>&1
      cat "$cd_file" > $WORK_DIR/cd_target2.txt
      rm -f "$cd_file"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/cd_target2.txt"
          content: "develop"
