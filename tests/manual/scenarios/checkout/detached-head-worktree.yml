name: Checkout detached HEAD worktree
description:
  When a worktree exists but is in detached HEAD state (e.g., interrupted
  rebase), checkout should navigate to it instead of failing

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"

  - name: Detach HEAD in develop worktree (simulates interrupted rebase)
    run: |
      cd develop
      git checkout --detach HEAD
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Go to detached worktree should succeed
    run: git-worktree-checkout develop 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "existing worktree"
