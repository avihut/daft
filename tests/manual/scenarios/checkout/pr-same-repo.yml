name: Checkout a same-repo pull request
description: >
  `daft go pr:N` resolves a PR through a (faked) gh CLI and checks out its
  source branch. This is the same-repo case: the head lives on the base repo, so
  it flows through the normal remote-branch path. A fake `gh` on PATH stands in
  for the real CLI (no network); it fails loudly on any unexpected call.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Check out pr:1 (source branch = develop) via a fake gh
    run: |
      set -e
      mkdir -p "$WORK_DIR/bin"
      cat > "$WORK_DIR/bin/gh" <<'GH'
      #!/usr/bin/env bash
      if [ "$*" = "repo set-default --view" ]; then echo "acme/widget"; exit 0; fi
      if [ "$1" = "api" ] && [ "$2" = "repos/acme/widget/pulls/1" ]; then
        printf '%s' '{"title":"Develop work","state":"open","draft":false,"user":{"login":"octocat"},"html_url":"https://github.com/acme/widget/pull/1","head":{"ref":"develop","repo":{"name":"widget","owner":{"login":"acme"}}},"base":{"ref":"main","repo":{"name":"widget","owner":{"login":"acme"}}}}'
        exit 0
      fi
      echo "unexpected gh call: $*" >&2
      exit 3
      GH
      chmod +x "$WORK_DIR/bin/gh"
      export PATH="$WORK_DIR/bin:$PATH"
      git-worktree-checkout pr:1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/develop"
          branch: develop
