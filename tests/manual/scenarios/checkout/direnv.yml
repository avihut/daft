name: Checkout direnv
description: Handles .envrc on remote branches

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Add .envrc to develop branch on remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git checkout develop 2>/dev/null
      echo "export TEST_VAR=develop_value" > .envrc
      git add .envrc
      git commit -m "Add .envrc to develop" 2>/dev/null
      git push origin develop 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch and checkout develop
    run: |
      cd $WORK_DIR/test-repo/main
      git fetch origin
      git-worktree-checkout develop
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"
      files_exist:
        - "$WORK_DIR/test-repo/develop/.envrc"
