name: Checkout carry shorthand
description: -c shorthand carries changes

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create file in main
    run: echo "shorthand content" > $WORK_DIR/test-repo/main/shorthand_file.txt

  - name: Checkout with -c shorthand
    run: git-worktree-checkout -c develop
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/develop/shorthand_file.txt"
