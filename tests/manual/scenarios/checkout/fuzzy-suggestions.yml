name: Checkout fuzzy suggestions
description: Error for typo includes Did you mean with correct suggestion

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Typo of develop shows fuzzy suggestion
    run: git-worktree-checkout develp 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
      output_contains:
        - "Did you mean"
        - "develop"
