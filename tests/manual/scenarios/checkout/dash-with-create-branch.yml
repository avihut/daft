name: Checkout dash with create branch
description: daft go -b - is correctly rejected

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Go -b dash is rejected
    run: git-worktree-checkout -b -- - 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
      output_contains:
        - "Cannot use '-' with -b"
