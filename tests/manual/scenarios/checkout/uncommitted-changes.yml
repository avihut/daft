name: Checkout with uncommitted changes
description: Uncommitted changes in current worktree don't affect checkout

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Make uncommitted changes in main
    run: echo "Uncommitted changes" > $WORK_DIR/test-repo/main/uncommitted.txt

  - name: Checkout develop despite dirty main
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/develop"
          branch: develop
      files_exist:
        - "$WORK_DIR/test-repo/main/uncommitted.txt"
