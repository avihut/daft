name: A PR reference is not a new branch name
description: >
  The create family (`-b` / `daft start`) rejects a pr:/mr: reference — it names
  an existing PR, not a branch to create — and points at `daft go` instead. Pure
  parse; no forge CLI is invoked.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Creating a branch named pr:5 is refused with a hint
    run: git-worktree-checkout -b pr:5
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "pull/merge request reference"
        - "go pr:5"
