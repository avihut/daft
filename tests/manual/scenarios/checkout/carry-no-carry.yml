name: Checkout explicit no-carry
description: --no-carry explicitly prevents carrying changes

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create file in main
    run: echo "explicit no carry" > $WORK_DIR/test-repo/main/explicit_file.txt

  - name: Checkout with --no-carry
    run: git-worktree-checkout --no-carry develop
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/develop/explicit_file.txt"
      files_exist:
        - "$WORK_DIR/test-repo/main/explicit_file.txt"
