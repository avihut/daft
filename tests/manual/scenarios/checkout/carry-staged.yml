name: Checkout carry staged
description: --carry carries staged changes

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create and stage a file in main
    run:
      cd $WORK_DIR/test-repo/main && echo "staged content" > staged_file.txt &&
      git add staged_file.txt

  - name: Checkout with --carry
    run: git-worktree-checkout --carry develop
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/develop/staged_file.txt"
