name: Checkout carry default
description: Default checkout does NOT carry untracked files

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create untracked file in main
    run:
      echo "should stay in original" > $WORK_DIR/test-repo/main/local_file.txt

  - name: Checkout develop (default - no carry)
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/develop/local_file.txt"
      files_exist:
        - "$WORK_DIR/test-repo/main/local_file.txt"
