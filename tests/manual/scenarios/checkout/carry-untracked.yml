name: Checkout carry untracked
description: --carry carries untracked files to new worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create untracked file in main
    run: echo "untracked content" > $WORK_DIR/test-repo/main/untracked_file.txt

  - name: Checkout with --carry
    run: git-worktree-checkout --carry develop
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/develop/untracked_file.txt"
