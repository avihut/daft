name: Repo link is idempotent and upserts metadata
description:
  re-linking an existing edge is a no-op; passing --name/--kind updates it in
  place; dedup collapses different URL forms of the same remote

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repo
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: First link
    run: daft repo link git@github.com:acme/api.git 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Linked: api"

  - name: Re-linking the same URL is a friendly no-op
    run: daft repo link git@github.com:acme/api.git 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Already linked: api"

  - name: A different URL form for the same remote also dedups (https vs scp)
    run:
      daft repo link https://github.com/acme/api --name backend --kind service
      2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Updated: backend [service]"
      file_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "name: backend"
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "kind: service"

  - name: Still a single relation entry — dedup kept the stored git@ URL
    run:
      test "$(grep -c 'url:' $WORK_DIR/test-repo/main/daft.yml)" -eq 1 && echo
      SINGLE_ENTRY
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "SINGLE_ENTRY"
      file_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "url: git@github.com:acme/api.git"
