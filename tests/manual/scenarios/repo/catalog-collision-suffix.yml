name: Repo catalog name collision auto-suffix
description:
  Cloning the same remote into two locations auto-suffixes the second catalog
  name (api, api-2) and prints a notice

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: First clone takes the plain name
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Second clone elsewhere gets suffixed
    run:
      mkdir -p elsewhere && cd elsewhere && git-worktree-clone --layout
      contained $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "test-repo-2"

  - name: Both entries are listed
    run: daft repo list
    expect:
      exit_code: 0
      output_contains:
        - "test-repo"
        - "test-repo-2"
