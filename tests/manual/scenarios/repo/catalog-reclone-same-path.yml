name: Repo catalog re-clone at the same path
description:
  Re-cloning at a path previously occupied creates a fresh identity that takes
  the live name; the old identity stays as a removed entry

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Remove the repo
    run: daft repo remove -y test-repo 2>&1
    expect:
      exit_code: 0

  - name: Re-clone at the same path
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: The new clone holds the live name
    run: daft repo list
    expect:
      exit_code: 0
      output_contains:
        - "test-repo"
      output_not_contains:
        - "(removed)"

  - name: The old identity is retained as removed
    run: daft repo list --all
    expect:
      exit_code: 0
      output_contains:
        - "test-repo (removed)"

  - name: Live entry wins for info
    run: daft repo info test-repo
    expect:
      exit_code: 0
      output_contains:
        - "live"
