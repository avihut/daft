name: Multi-remote status YAML format
description:
  daft multi-remote status --format yaml emits structured status as YAML

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: YAML output has remotes and worktrees sections
    run: daft multi-remote status --format yaml 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "remotes:"
        - "worktrees:"
