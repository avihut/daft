name: Multi-remote status format error cases
description: Unsupported formats and invalid values are rejected

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: --format tsv is unsupported for Sectioned shape
    run: daft multi-remote status --format tsv 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "does not support"

  - name: --format bogus is rejected by clap
    run: daft multi-remote status --format bogus 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 2
      output_contains:
        - "invalid value"

  - name: --format and --template conflict
    run: "daft multi-remote status --format json --template 'x' 2>&1"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 2
      output_contains:
        - "cannot be used with"
