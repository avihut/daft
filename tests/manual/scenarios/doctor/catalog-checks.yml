name: Doctor catalog checks
description:
  daft doctor reports catalog hygiene — a live entry whose path vanished is a
  warning, and --fix marks it removed

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  # DAFT_SKILLS_DIR (set per-sandbox by the runner) points doctor's agent-skill
  # check at the sandbox rather than the real ~/.claude, so `daft doctor --fix`
  # here cannot rewrite the developer's real skill file — which the real-state
  # tripwire would otherwise catch and fail the suite over.
  - name: Healthy catalog passes
    run: daft doctor 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Catalog"

  - name: Delete the repo behind the catalog's back
    run: rm -rf test-repo
    expect:
      exit_code: 0

  - name: Doctor flags the stale entry
    run: daft doctor 2>&1
    cwd: "$WORK_DIR"
    expect:
      exit_code: 0
      output_contains:
        - "point at missing paths"

  - name: --fix tombstones it
    run: daft doctor --fix 2>&1
    cwd: "$WORK_DIR"
    expect:
      exit_code: 0

  - name: The entry is now removed
    run: daft repo list --all
    cwd: "$WORK_DIR"
    expect:
      exit_code: 0
      output_contains:
        - "test-repo (removed)"
