name: Fish completions
description: Fish completion generation contains expected content

steps:
  - name: Fish completion generation for checkout
    run: daft completions fish --command=git-worktree-checkout 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "complete -c git-worktree-checkout"

  - name: Fish dynamic branch wiring for checkout
    run: daft completions fish --command=git-worktree-checkout 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "daft __complete"

  - name: Fish git subcommand registration for checkout
    run: daft completions fish --command=git-worktree-checkout 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "complete -c git"
        - "__fish_seen_subcommand_from"

  - name: shell-init fish includes completion functions
    run: daft shell-init fish 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "complete -c git-worktree-checkout"

  - name: Fish completion includes verbose flag
    run: daft completions fish --command=git-worktree-checkout 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "verbose"

  - name: Fish completions for clone command
    run: daft completions fish --command=git-worktree-clone 2>&1
    expect:
      exit_code: 0

  - name: Fish completions for init command
    run: daft completions fish --command=git-worktree-init 2>&1
    expect:
      exit_code: 0

  - name: Fish completions for prune command
    run: daft completions fish --command=git-worktree-prune 2>&1
    expect:
      exit_code: 0

  - name: Fish completions for carry command
    run: daft completions fish --command=git-worktree-carry 2>&1
    expect:
      exit_code: 0

  - name: Fish completions for fetch command
    run: daft completions fish --command=git-worktree-fetch 2>&1
    expect:
      exit_code: 0

  - name: Fish completions for flow-adopt command
    run: daft completions fish --command=git-worktree-flow-adopt 2>&1
    expect:
      exit_code: 0

  - name: Fish completions for flow-eject command
    run: daft completions fish --command=git-worktree-flow-eject 2>&1
    expect:
      exit_code: 0
