name: Fetch with pass-through arguments
description: Pass-through arguments to git pull (-- --no-stat)

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Passthrough test change" >> README.md
      git add README.md
      git commit -m "Passthrough test update"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch with pass-through arguments
    run: git-worktree-fetch -- --no-stat 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify changes were pulled
    run: grep -q "Passthrough test change" $WORK_DIR/test-repo/main/README.md
    expect:
      exit_code: 0
