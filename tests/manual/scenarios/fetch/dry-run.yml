name: Fetch dry run
description: --dry-run does not actually pull changes

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Record HEAD hash before fetch
    run:
      cd $WORK_DIR/test-repo/main && git rev-parse HEAD >
      /tmp/daft-fetch-dryrun-before
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Dry run change" >> README.md
      git add README.md
      git commit -m "Dry run update"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch with --dry-run
    run: git-worktree-fetch --dry-run 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify HEAD was not changed
    run: |
      before=$(cat /tmp/daft-fetch-dryrun-before)
      after=$(cd $WORK_DIR/test-repo/main && git rev-parse HEAD)
      echo "before=$before after=$after"
      [ "$before" = "$after" ]
    expect:
      exit_code: 0
