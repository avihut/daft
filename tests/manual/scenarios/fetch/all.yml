name: Fetch all worktrees
description: --all flag fetches all worktrees

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Push remote changes to main and develop
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "All update main" >> README.md
      git add README.md
      git commit -m "Update main"
      git push origin main
      git checkout develop
      echo "All update develop" >> README.md
      git add README.md
      git commit -m "Update develop"
      git push origin develop
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch all worktrees
    run: git-worktree-fetch --all 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Verify main was updated
    run: grep -q "All update main" $WORK_DIR/test-repo/main/README.md
    expect:
      exit_code: 0

  - name: Verify develop was updated
    run: grep -q "All update develop" $WORK_DIR/test-repo/develop/README.md
    expect:
      exit_code: 0
