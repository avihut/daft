name: Fetch multiple worktrees
description: Fetch multiple worktrees at once

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Checkout feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Push remote changes to develop and feature
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git checkout develop
      echo "Multiple update develop" >> README.md
      git add README.md
      git commit -m "Update develop"
      git push origin develop
      git checkout feature/test-feature
      echo "Multiple update feature" >> README.md
      git add README.md
      git commit -m "Update feature"
      git push origin feature/test-feature
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch multiple worktrees
    run: git-worktree-fetch develop feature/test-feature 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Verify develop was updated
    run: grep -q "Multiple update develop" $WORK_DIR/test-repo/develop/README.md
    expect:
      exit_code: 0

  - name: Verify feature was updated
    run:
      grep -q "Multiple update feature"
      "$WORK_DIR/test-repo/feature/test-feature/README.md"
    expect:
      exit_code: 0
