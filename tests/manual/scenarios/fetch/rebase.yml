name: Fetch with rebase
description: --rebase flag works when fetching

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Rebase remote change" >> README.md
      git add README.md
      git commit -m "Rebase remote update"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch with --rebase
    run: git-worktree-fetch --rebase 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify changes were pulled
    run: grep -q "Rebase remote change" $WORK_DIR/test-repo/main/README.md
    expect:
      exit_code: 0
