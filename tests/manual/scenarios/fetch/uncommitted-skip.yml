name: Fetch skips worktree with uncommitted changes
description: Uncommitted changes cause worktree to be skipped

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Remote change" >> README.md
      git add README.md
      git commit -m "Remote update"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Create uncommitted changes in main
    run: echo "Local uncommitted change" > $WORK_DIR/test-repo/main/local.txt
    expect:
      exit_code: 0

  - name: Fetch should warn about uncommitted changes
    run: git-worktree-fetch 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "uncommitted changes"

  - name: Verify local changes are preserved
    run: test -f $WORK_DIR/test-repo/main/local.txt
    expect:
      exit_code: 0
