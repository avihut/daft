name: Fetch self-referencing refspec
description: Explicit self-referencing refspec (fetch main from main)

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Self-ref update" >> README.md
      git add README.md
      git commit -m "Self-ref test update"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch using explicit self-referencing refspec
    run: git-worktree-fetch main 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify changes were pulled
    run: grep -q "Self-ref update" $WORK_DIR/test-repo/main/README.md
    expect:
      exit_code: 0
