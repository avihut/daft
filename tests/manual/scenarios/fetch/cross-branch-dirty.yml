name: Cross-branch refspec skips dirty worktree
description: Cross-branch refspec skips dirty worktree without --force

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a feature worktree
    run: git-worktree-checkout -b feature/test-dirty
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-dirty"

  - name: Make feature worktree dirty
    run:
      echo "Uncommitted change" >
      $WORK_DIR/test-repo/feature/test-dirty/dirty.txt
    expect:
      exit_code: 0

  - name: Cross-branch refspec should skip dirty worktree
    run: git-worktree-fetch "main:feature/test-dirty" 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "uncommitted changes"
