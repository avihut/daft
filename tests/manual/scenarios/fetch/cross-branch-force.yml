name: Cross-branch --force on dirty worktree
description: Cross-branch --force proceeds even with dirty worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a feature worktree
    run: git-worktree-checkout -b feature/test-force
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-force"

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Force cross-branch update" >> README.md
      git add README.md
      git commit -m "Force cross-branch test"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Make feature worktree dirty with untracked file
    run: echo "Uncommitted" > $WORK_DIR/test-repo/feature/test-force/dirty.txt
    expect:
      exit_code: 0

  - name: Cross-branch with --force should proceed
    run: git-worktree-fetch --force "main:feature/test-force" 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify feature worktree was updated
    run:
      grep -q "Force cross-branch update"
      "$WORK_DIR/test-repo/feature/test-force/README.md"
    expect:
      exit_code: 0
