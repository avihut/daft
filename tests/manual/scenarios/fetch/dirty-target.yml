name: Fetch skips dirty target worktree
description: Dirty target worktree skipped when fetched from clean worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"

  - name: Push remote changes to develop
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git checkout develop
      echo "Remote develop change" >> README.md
      git add README.md
      git commit -m "Remote develop update"
      git push origin develop
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Make develop worktree dirty
    run:
      echo "Uncommitted change in develop" >
      $WORK_DIR/test-repo/develop/dirty.txt
    expect:
      exit_code: 0

  - name: Fetch dirty develop from clean main should skip
    run: git-worktree-fetch develop 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "uncommitted changes"
