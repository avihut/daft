name: Fetch with deprecated config fallback
description: Deprecated daft.fetch.args still works as fallback

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Set deprecated daft.fetch.args config
    run: git config daft.fetch.args "--rebase --autostash"
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Config fallback change" >> README.md
      git add README.md
      git commit -m "Config fallback update"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch should use deprecated config as fallback
    run: git-worktree-fetch 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify changes were pulled
    run: grep -q "Config fallback change" $WORK_DIR/test-repo/main/README.md
    expect:
      exit_code: 0
