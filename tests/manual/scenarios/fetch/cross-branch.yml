name: Fetch cross-branch refspec
description:
  "Cross-branch refspec main:feature/test syncs main into feature worktree"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a feature worktree
    run: git-worktree-checkout -b feature/test-cross
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-cross"

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Cross-branch update from main" >> README.md
      git add README.md
      git commit -m "Main branch update for cross-branch test"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch with cross-branch refspec
    run: git-worktree-fetch "main:feature/test-cross" 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify feature worktree has main branch content
    run:
      grep -q "Cross-branch update from main"
      "$WORK_DIR/test-repo/feature/test-cross/README.md"
    expect:
      exit_code: 0
