name: Cross-branch --dry-run
description: Cross-branch --dry-run does not modify worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a feature worktree
    run: git-worktree-checkout -b feature/test-dryrun
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-dryrun"

  - name: Record feature HEAD before dry-run
    run: |
      cd $WORK_DIR/test-repo/feature/test-dryrun && git rev-parse HEAD > /tmp/daft-fetch-crossdry-before
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Dry run cross-branch" >> README.md
      git add README.md
      git commit -m "Dry run cross-branch test"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Cross-branch with --dry-run should not change anything
    run: git-worktree-fetch --dry-run "main:feature/test-dryrun" 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify feature worktree was not changed
    run: |
      before=$(cat /tmp/daft-fetch-crossdry-before)
      after=$(cd $WORK_DIR/test-repo/feature/test-dryrun && git rev-parse HEAD)
      echo "before=$before after=$after"
      [ "$before" = "$after" ]
    expect:
      exit_code: 0
