name: Fetch current worktree
description: Fetches remote changes to current worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Push new content to remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git checkout main
      echo "new content" > new-file.txt
      git add new-file.txt
      git commit -m "Add new file"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch from main worktree
    run: git-worktree-fetch 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
