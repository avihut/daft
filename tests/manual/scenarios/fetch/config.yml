name: Fetch with config defaults
description: daft.update.args config sets default fetch behavior

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Set daft.update.args config
    run: git config daft.update.args "--rebase --autostash"
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Config test change" >> README.md
      git add README.md
      git commit -m "Config test update"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch should use config settings
    run: git-worktree-fetch 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify changes were pulled
    run: grep -q "Config test change" $WORK_DIR/test-repo/main/README.md
    expect:
      exit_code: 0
