name: Fetch with --force and --autostash
description: --force with --autostash on dirty worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Push remote changes to main
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      echo "Force remote change" >> README.md
      git add README.md
      git commit -m "Force remote update"
      git push origin main
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Create uncommitted tracked file change in main
    run: echo "Local tracked change" >> $WORK_DIR/test-repo/main/README.md
    expect:
      exit_code: 0

  - name: Fetch with --force --autostash should proceed
    run: git-worktree-fetch --force --autostash 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
