name: Fetch specific worktree
description: Fetch specific worktree by name from another worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"

  - name: Push remote changes to develop
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git checkout develop
      echo "Update to develop branch" >> README.md
      git add README.md
      git commit -m "Update develop branch"
      git push origin develop
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Fetch develop from main worktree
    run: git-worktree-fetch develop 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify changes were pulled to develop
    run:
      grep -q "Update to develop branch" $WORK_DIR/test-repo/develop/README.md
    expect:
      exit_code: 0
