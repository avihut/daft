name: "Path handling"
description: "Relative paths work, absolute paths are rejected"

steps:
  - name: "Init with relative path"
    run: "git-worktree-init --layout contained relative-path-test"
    expect:
      exit_code: 0
      dirs_exist:
        - "relative-path-test"
        - "relative-path-test/master"

  - name: "Reject absolute path"
    run:
      "git-worktree-init --layout contained $WORK_DIR/absolute-path-test 2>&1"
    expect:
      exit_code: 1
