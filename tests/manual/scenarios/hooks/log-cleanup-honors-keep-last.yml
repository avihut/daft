name: Log cleanup honors keep_last sanity floor
description:
  "Sets retention=1d and keep_last=3, fires the hook five times, backdates every
  meta.json to 2 days ago, then runs `daft hooks jobs prune`. Even though every
  invocation is past retention, the keep_last floor must preserve the three most
  recent ones."

repos:
  - name: test-log-cleanup-keep-last
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Log cleanup keep_last test"
        commits:
          - message: "Initial commit"
      - name: feature/k
        from: main
    daft_yml: |
      hooks:
        worktree-post-create:
          jobs:
            - name: build
              run: echo build-output
              log:
                retention: 1d
                keep_last: 3

steps:
  - name: Clone the repository with --trust-hooks
    run:
      env -u DAFT_TESTING git-worktree-clone --trust-hooks --layout contained
      $REMOTE_TEST_LOG_CLEANUP_KEEP_LAST 2>&1
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-log-cleanup-keep-last/main"

  - name: Checkout the feature branch once (creates first invocation)
    run: env -u DAFT_TESTING git-worktree-checkout feature/k 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-keep-last/main"
    expect:
      exit_code: 0

  - name:
      Fire the same hook four more times via `daft hooks run` so that all five
      invocations land on the same worktree (so keep_last applies)
    run: |
      cd "$WORK_DIR/test-log-cleanup-keep-last/feature/k"
      for i in 1 2 3 4; do
        daft hooks run worktree-post-create 2>&1 || exit 1
        # Ensure distinct started_at timestamps.
        sleep 0.1
      done
      echo MANUAL_RUNS_DONE
    expect:
      exit_code: 0
      output_contains:
        - "MANUAL_RUNS_DONE"

  - name:
      Confirm at least 6 invocation dirs exist (main post-create, feature/k
      post-create, plus 4 manual runs)
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-keep-last/.git/daft-id")
      JOBS_DIR="$HOME/.local/state/daft/jobs/$REPO_ID"
      INV_COUNT=$(find "$JOBS_DIR" -maxdepth 1 -mindepth 1 -type d | wc -l | tr -d ' ')
      echo "INV_COUNT_BEFORE=$INV_COUNT"
      [ "$INV_COUNT" -ge "6" ] || { echo "expected >=6, got $INV_COUNT"; exit 1; }
    expect:
      exit_code: 0
      output_contains:
        - "INV_COUNT_BEFORE="

  - name: Backdate every SQLite job/invocation row by 2 days (keeps ordering)
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-keep-last/.git/daft-id")
      DB="$HOME/.local/state/daft/jobs/$REPO_ID/coordinator.db"
      [ -f "$DB" ] || { echo "missing coordinator.db at $DB"; exit 1; }
      # Per-row Python shift so relative ordering of started_at is
      # preserved (uniform -2d). SQLite's datetime() truncates fractional
      # seconds; we do the shift in Python and emit one UPDATE per row.
      python3 - "$DB" <<'PY'
      import sqlite3, sys, datetime
      conn = sqlite3.connect(sys.argv[1])
      delta = datetime.timedelta(days=2)
      def shift(ts):
          if not ts:
              return ts
          # Strip "Z" and any timezone fragment; parse the fractional form
          # daft writes (e.g. 2026-05-16T12:00:00.123456789+00:00).
          core = ts.rstrip("Z").split("+")[0]
          if "." in core:
              core = core[: core.index(".") + 7]  # cap microseconds
              fmt = "%Y-%m-%dT%H:%M:%S.%f"
          else:
              fmt = "%Y-%m-%dT%H:%M:%S"
          dt = datetime.datetime.strptime(core, fmt)
          return (dt - delta).strftime("%Y-%m-%dT%H:%M:%S.%f+00:00")
      cur = conn.cursor()
      patched = 0
      for table, cols in (
          ("jobs", ("started_at", "finished_at")),
          ("invocations", ("created_at",)),
      ):
          for row in cur.execute(f"SELECT rowid, {', '.join(cols)} FROM {table}").fetchall():
              rid = row[0]
              new = [shift(v) for v in row[1:]]
              set_clause = ", ".join(f"{c} = ?" for c in cols)
              cur.execute(f"UPDATE {table} SET {set_clause} WHERE rowid = ?", (*new, rid))
              patched += 1
      conn.commit()
      print(f"PATCHED={patched}")
      PY
    expect:
      exit_code: 0
      output_contains:
        - "PATCHED="

  - name:
      Run `daft hooks jobs prune` — keep_last=3 must protect three invocations
    run: daft hooks jobs prune 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-keep-last/feature/k"
    expect:
      exit_code: 0

  - name:
      Confirm exactly 4 invocation dirs remain — 1 protected on main worktree, 3
      protected on feature/k worktree (keep_last=3)
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-keep-last/.git/daft-id")
      JOBS_DIR="$HOME/.local/state/daft/jobs/$REPO_ID"
      INV_COUNT=$(find "$JOBS_DIR" -maxdepth 1 -mindepth 1 -type d | wc -l | tr -d ' ')
      echo "INV_COUNT_AFTER=$INV_COUNT"
      [ "$INV_COUNT" = "4" ] || { echo "expected 4, got $INV_COUNT"; exit 1; }
    expect:
      exit_code: 0
      output_contains:
        - "INV_COUNT_AFTER=4"
