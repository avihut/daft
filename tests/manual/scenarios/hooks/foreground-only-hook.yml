name: Foreground-only hook creates an invocation record
description:
  "Regression for the 'foreground jobs are invisible' bug. A hook that declares
  only foreground jobs used to write nothing to the log store, so 'daft hooks
  jobs' showed no record. After the universal hook invocation logging feature,
  the hook's invocation and every foreground job must appear in the listing, and
  'daft hooks jobs logs <name>' must return the captured output. This scenario
  uses the natural worktree-creation path (git-worktree-checkout) to trigger
  worktree-post-create, exactly as a user would experience it."

repos:
  - name: test-fg-only-hook
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Foreground-only hook test"
        commits:
          - message: "Initial commit"
      - name: feature/fg
        from: main
    daft_yml: |
      hooks:
        worktree-post-create:
          jobs:
            - name: say-hello
              run: echo hello-from-fg
            - name: say-done
              run: echo done-from-fg

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_FG_ONLY_HOOK
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-fg-only-hook/main"
      files_exist:
        - "$WORK_DIR/test-fg-only-hook/main/daft.yml"

  - name: Trust the repository
    run: daft hooks trust --force 2>&1
    cwd: "$WORK_DIR/test-fg-only-hook/main"
    expect:
      exit_code: 0

  - name:
      Checkout feature branch (triggers foreground-only worktree-post-create
      hook)
    run: env -u DAFT_TESTING git-worktree-checkout feature/fg 2>&1
    cwd: "$WORK_DIR/test-fg-only-hook/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-fg-only-hook/feature/fg"
      output_contains:
        - "hello-from-fg"
        - "done-from-fg"

  - name:
      List jobs from inside the new worktree — should show invocation + two fg
      rows
    run: daft hooks jobs 2>&1
    cwd: "$WORK_DIR/test-fg-only-hook/feature/fg"
    expect:
      exit_code: 0
      output_contains:
        - "worktree-post-create"
        - "say-hello"
        - "say-done"
        - "completed"
      output_not_contains:
        - "(no jobs declared)"
        - "No background job history found."

  - name: View log for the first fg job — should show captured stdout
    run: daft hooks jobs logs say-hello 2>&1
    cwd: "$WORK_DIR/test-fg-only-hook/feature/fg"
    expect:
      exit_code: 0
      output_contains:
        - "say-hello"
        - "hello-from-fg"
        - "COMPLETED"

  - name: View log for the second fg job — should show captured stdout
    run: daft hooks jobs logs say-done 2>&1
    cwd: "$WORK_DIR/test-fg-only-hook/feature/fg"
    expect:
      exit_code: 0
      output_contains:
        - "say-done"
        - "done-from-fg"
        - "COMPLETED"
