name: Log cleanup never removes Running jobs
description:
  "Constructs a synthetic invocation on disk with status=Running and a recent
  started_at, then verifies that `daft hooks jobs prune` (with retention
  override 0s and keep_last=0) refuses to remove it. After flipping the status
  to Completed, the same clean call removes it."

env:
  DAFT_NO_LOG_CLEAN: "1"

repos:
  - name: test-log-cleanup-running
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Cleanup skips running test"
        commits:
          - message: "Initial commit"
      - name: feature/r
        from: main
    daft_yml: |
      hooks:
        worktree-post-create:
          jobs:
            - name: marker
              run: echo done
              log:
                keep_last: 0

steps:
  - name: Clone the repository with --trust-hooks (creates the repo identity)
    run:
      env -u DAFT_TESTING git-worktree-clone --trust-hooks --layout contained
      $REMOTE_TEST_LOG_CLEANUP_RUNNING 2>&1
    expect:
      exit_code: 0

  - name: Checkout feature branch (fires worktree-post-create once)
    run: env -u DAFT_TESTING git-worktree-checkout feature/r 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-running/main"
    expect:
      exit_code: 0

  - name:
      Construct a synthetic Running invocation directly in coordinator.db —
      fresh started_at, no finished_at, status=running. Simulates a hook
      invocation that was started but never reached a terminal state (the daft
      process crashed, or a coordinator is genuinely still running).
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-running/.git/daft-id")
      JOBS_DIR="${DAFT_STATE_DIR:-$HOME/.local/state/daft}/jobs/$REPO_ID"
      DB="$JOBS_DIR/coordinator.db"
      INV_ID=feedfeedfeedfeed
      [ -f "$DB" ] || { echo "missing coordinator.db at $DB"; exit 1; }
      mkdir -p "$JOBS_DIR/$INV_ID/longjob"
      python3 - "$DB" "$REPO_ID" "$INV_ID" <<'PY'
      import sqlite3, sys, datetime
      db, repo, inv = sys.argv[1], sys.argv[2], sys.argv[3]
      now = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%f+00:00")
      conn = sqlite3.connect(db)
      conn.execute(
          "INSERT INTO invocations(repo_hash, invocation_id, trigger_command, hook_type, worktree, created_at, coordinator_pid) "
          "VALUES (?, ?, 'test-synthetic', 'worktree-post-create', 'feature/r', ?, NULL)",
          (repo, inv, now),
      )
      conn.execute(
          "INSERT INTO jobs(repo_hash, invocation_id, name, hook_type, worktree, command, working_dir, env_json, started_at, finished_at, status, exit_code, pid, pgid, background, needs_json, tags_json, retention_seconds, max_log_size_bytes) "
          "VALUES (?, ?, 'longjob', 'worktree-post-create', 'feature/r', 'sleep 9999', '/tmp', '{}', ?, NULL, 'running', NULL, NULL, NULL, 1, '[]', '[]', NULL, NULL)",
          (repo, inv, now),
      )
      conn.commit()
      print("SYNTH_OK")
      PY
      # Empty placeholder log file so the eviction path has something to remove.
      : > "$JOBS_DIR/$INV_ID/longjob/output.jsonl"
    expect:
      exit_code: 0
      output_contains:
        - "SYNTH_OK"

  - name:
      Run `daft hooks jobs prune --older-than 0s` — must NOT remove the
      synthetic Running invocation (running jobs are skipped)
    run: daft hooks jobs prune --older-than 0s 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-running/feature/r"
    expect:
      exit_code: 0

  - name: The synthetic Running invocation dir must still exist
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-running/.git/daft-id")
      JOBS_DIR="${DAFT_STATE_DIR:-$HOME/.local/state/daft}/jobs/$REPO_ID"
      [ -d "$JOBS_DIR/feedfeedfeedfeed" ] || { echo "Running invocation was removed"; exit 1; }
      echo "RUNNING_PRESERVED=1"
    expect:
      exit_code: 0
      output_contains:
        - "RUNNING_PRESERVED=1"

  - name:
      Flip the synthetic invocation's status to completed and re-run clean — now
      it must be removed
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-running/.git/daft-id")
      DB="${DAFT_STATE_DIR:-$HOME/.local/state/daft}/jobs/$REPO_ID/coordinator.db"
      NOW=$(python3 -c "import datetime; print(datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S.%f+00:00'))")
      sqlite3 "$DB" \
        "UPDATE jobs SET status = 'completed', exit_code = 0, finished_at = '$NOW' WHERE name = 'longjob' AND invocation_id = 'feedfeedfeedfeed';"
      daft hooks jobs prune --older-than 0s 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-running/feature/r"
    expect:
      exit_code: 0
      output_contains:
        - "Removed"

  - name: The (now-terminal) synthetic invocation dir is gone
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-running/.git/daft-id")
      JOBS_DIR="${DAFT_STATE_DIR:-$HOME/.local/state/daft}/jobs/$REPO_ID"
      if [ -d "$JOBS_DIR/feedfeedfeedfeed" ]; then
        echo "synthetic invocation still present"
        exit 1
      fi
      echo "CLEANED=1"
    expect:
      exit_code: 0
      output_contains:
        - "CLEANED=1"
