name: Log cleanup --dry-run lists candidates without removing
description:
  "With log.retention=1d set on the job and the meta.json backdated to 2 days
  ago, `daft hooks jobs prune --dry-run` must report what would be removed but
  leave the invocation dir untouched on disk."

env:
  DAFT_NO_LOG_CLEAN: "1"

repos:
  - name: test-log-cleanup-dryrun
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Cleanup dry-run test"
        commits:
          - message: "Initial commit"
      - name: feature/dry
        from: main
    daft_yml: |
      hooks:
        worktree-post-create:
          jobs:
            - name: build
              run: echo build-output
              log:
                retention: 1d
                keep_last: 0

steps:
  - name: Clone the repository with --trust-hooks
    run:
      env -u DAFT_TESTING git-worktree-clone --trust-hooks --layout contained
      $REMOTE_TEST_LOG_CLEANUP_DRYRUN 2>&1
    expect:
      exit_code: 0

  - name: Checkout feature branch (fires the hook)
    run: env -u DAFT_TESTING git-worktree-checkout feature/dry 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-dryrun/main"
    expect:
      exit_code: 0

  - name: Backdate every SQLite job/invocation timestamp to 2 days ago
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-dryrun/.git/daft-id")
      DB="${DAFT_STATE_DIR:-$HOME/.local/state/daft}/jobs/$REPO_ID/coordinator.db"
      [ -f "$DB" ] || { echo "missing coordinator.db at $DB"; exit 1; }
      OLD=$(python3 -c "import datetime; print((datetime.datetime.utcnow() - datetime.timedelta(days=2)).strftime('%Y-%m-%dT%H:%M:%S.%fZ'))")
      sqlite3 "$DB" \
        "UPDATE jobs SET started_at = '$OLD', finished_at = CASE WHEN finished_at IS NOT NULL THEN '$OLD' ELSE NULL END; UPDATE invocations SET created_at = '$OLD';"
      echo "BACKDATE_OK"
    expect:
      exit_code: 0
      output_contains:
        - "BACKDATE_OK"

  - name: Snapshot the invocation count before --dry-run
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-dryrun/.git/daft-id")
      JOBS_DIR="${DAFT_STATE_DIR:-$HOME/.local/state/daft}/jobs/$REPO_ID"
      INV_COUNT=$(find "$JOBS_DIR" -maxdepth 1 -mindepth 1 -type d | wc -l | tr -d ' ')
      echo "INV_COUNT_BEFORE=$INV_COUNT"
      mkdir -p "$WORK_DIR/.scratch"
      printf '%s' "$INV_COUNT" > "$WORK_DIR/.scratch/before"
    expect:
      exit_code: 0
      output_contains:
        - "INV_COUNT_BEFORE="

  - name:
      Run `daft hooks jobs prune --dry-run` — must list "Would remove" but leave
      the disk untouched
    run: daft hooks jobs prune --dry-run 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-dryrun/feature/dry"
    expect:
      exit_code: 0
      output_contains:
        - "Would remove"
      output_not_contains:
        - "Removed"

  - name: Confirm no invocation dirs were actually removed
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-dryrun/.git/daft-id")
      JOBS_DIR="${DAFT_STATE_DIR:-$HOME/.local/state/daft}/jobs/$REPO_ID"
      INV_COUNT=$(find "$JOBS_DIR" -maxdepth 1 -mindepth 1 -type d | wc -l | tr -d ' ')
      BEFORE=$(cat "$WORK_DIR/.scratch/before")
      echo "INV_COUNT_AFTER=$INV_COUNT"
      echo "INV_COUNT_BEFORE=$BEFORE"
      [ "$INV_COUNT" = "$BEFORE" ] || { echo "dry-run modified the disk: $BEFORE -> $INV_COUNT"; exit 1; }
      echo "DRY_RUN_PRESERVED=1"
    expect:
      exit_code: 0
      output_contains:
        - "DRY_RUN_PRESERVED=1"
