name: Hooks flags exclusive
description: --no-hooks and --trust-hooks are mutually exclusive on clone

repos:
  - name: test-hooks-exclusive
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Exclusive flags test"
        commits:
          - message: "Initial commit"

steps:
  - name: Clone with both flags fails
    run:
      git-worktree-clone --trust-hooks --no-hooks $REMOTE_TEST_HOOKS_EXCLUSIVE
      2>&1
    expect:
      exit_code: 1
