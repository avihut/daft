name: Top-level log defaults reach the redb-backed repo policy
description:
  "Regression for Task 6 + Task 8: top-level `log:` defaults in daft.yml must
  flow into each job's merged log_config and be persisted in the per-repo redb
  `repo_policy_v1` table (formerly `repo-policy.json`). Asserts that
  max_total_size=100MB and keep_last=5 (declared at the top level, not per-job)
  survive the round-trip and are written under the canonical field names
  (`max_total_size_bytes`, `keep_last`). Inspection is via the `daft
  __dump-store repo-policy` debug helper since the JSON sidecar is deleted after
  one-shot migration to redb (#476 Tier-3)."

repos:
  - name: test-repo-log-defaults
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Top-level log defaults test"
        commits:
          - message: "Initial commit"
      - name: feature/x
        from: main
    daft_yml: |
      log:
        max_total_size: 100MB
        keep_last: 5
      hooks:
        worktree-post-create:
          jobs:
            - name: hello
              run: echo hi

steps:
  - name: Clone the repository with --trust-hooks
    run:
      env -u DAFT_TESTING git-worktree-clone --trust-hooks --layout contained
      $REMOTE_TEST_REPO_LOG_DEFAULTS 2>&1
    expect:
      exit_code: 0

  - name: Checkout feature/x — fires worktree-post-create
    run: env -u DAFT_TESTING git-worktree-checkout feature/x 2>&1
    cwd: "$WORK_DIR/test-repo-log-defaults/main"
    expect:
      exit_code: 0

  - name:
      Redb-backed repo policy must contain the persisted top-level log defaults
      (100MB → 104857600 bytes, keep_last=5)
    run: |
      echo "----- daft __dump-store repo-policy -----"
      daft __dump-store repo-policy
      echo "------------------------------------------"
    cwd: "$WORK_DIR/test-repo-log-defaults/feature/x"
    expect:
      exit_code: 0
      output_contains:
        - '"max_total_size_bytes": 104857600'
        - '"keep_last": 5'
