name: Top-level log defaults reach repo-policy.json
description:
  "Regression for Task 6 + Task 8: top-level `log:` defaults in daft.yml must
  flow into each job's merged log_config and end up in
  $XDG_STATE_HOME/daft/jobs/<repo-id>/repo-policy.json. Asserts that
  max_total_size=100MB and keep_last=5 (declared at the top level, not per-job)
  survive the round-trip and are persisted with the canonical field names
  (`max_total_size_bytes`, `keep_last`)."

repos:
  - name: test-repo-log-defaults
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Top-level log defaults test"
        commits:
          - message: "Initial commit"
      - name: feature/x
        from: main
    daft_yml: |
      log:
        max_total_size: 100MB
        keep_last: 5
      hooks:
        worktree-post-create:
          jobs:
            - name: hello
              run: echo hi

steps:
  - name: Clone the repository with --trust-hooks
    run:
      env -u DAFT_TESTING git-worktree-clone --trust-hooks --layout contained
      $REMOTE_TEST_REPO_LOG_DEFAULTS 2>&1
    expect:
      exit_code: 0

  - name: Checkout feature/x — fires worktree-post-create
    run: env -u DAFT_TESTING git-worktree-checkout feature/x 2>&1
    cwd: "$WORK_DIR/test-repo-log-defaults/main"
    expect:
      exit_code: 0

  - name:
      repo-policy.json must exist and contain the persisted top-level log
      defaults (100MB → 104857600 bytes, keep_last=5)
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-repo-log-defaults/.git/daft-id")
      POLICY="$HOME/.local/state/daft/jobs/$REPO_ID/repo-policy.json"
      [ -f "$POLICY" ] || { echo "repo-policy.json missing at $POLICY"; exit 1; }
      echo "POLICY_PATH=$POLICY"
      echo "----- repo-policy.json -----"
      cat "$POLICY"
      echo
      echo "----------------------------"
    expect:
      exit_code: 0
      output_contains:
        - "POLICY_PATH="
        - '"max_total_size_bytes": 104857600'
        - '"keep_last": 5'
