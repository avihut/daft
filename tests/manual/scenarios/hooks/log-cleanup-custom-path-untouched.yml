name: Log cleanup never touches user-managed paths outside the state dir
description:
  "The cleanup pipeline operates only on the daft state dir
  (`<state>/jobs/<repo-uuid>/`). Files created by user hooks at arbitrary paths
  — even those declared via log.path — must never be touched by cleanup. This
  scenario verifies that a file written by a hook to /tmp/daft-test-custom-log/
  survives a `daft hooks jobs clean` run that reaps the daft-managed invocation
  dirs."

env:
  DAFT_NO_LOG_CLEAN: "1"

repos:
  - name: test-log-cleanup-custom-path
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Custom log path test"
        commits:
          - message: "Initial commit"
      - name: feature/cp
        from: main
    daft_yml: |
      hooks:
        worktree-post-create:
          jobs:
            - name: build
              # Job writes its own user-managed log file at a fixed path
              # AND advertises that path via log.path so the metadata
              # reflects the v1 schema.
              run: |
                mkdir -p /tmp/daft-test-custom-log
                echo custom-path-output > /tmp/daft-test-custom-log/build.log
              log:
                retention: 1d
                keep_last: 0
                path: /tmp/daft-test-custom-log/build.log

steps:
  - name: Pre-clean the custom log directory
    run: rm -rf /tmp/daft-test-custom-log
    expect:
      exit_code: 0

  - name: Clone the repository with --trust-hooks
    run:
      env -u DAFT_TESTING git-worktree-clone --trust-hooks --layout contained
      $REMOTE_TEST_LOG_CLEANUP_CUSTOM_PATH 2>&1
    expect:
      exit_code: 0

  - name: Checkout feature branch (fires the hook, writes to custom path)
    run: env -u DAFT_TESTING git-worktree-checkout feature/cp 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-custom-path/main"
    expect:
      exit_code: 0

  - name: Confirm the user-managed log file was written outside the state dir
    run: |
      [ -f /tmp/daft-test-custom-log/build.log ] || { echo "user log missing"; exit 1; }
      grep -q "custom-path-output" /tmp/daft-test-custom-log/build.log
      echo "USER_LOG_PRESENT=1"
    expect:
      exit_code: 0
      output_contains:
        - "USER_LOG_PRESENT=1"

  - name: Backdate every meta.json so retention triggers cleanup
    run: |
      REPO_ID=$(cat "$WORK_DIR/test-log-cleanup-custom-path/.git/daft-id")
      JOBS_DIR="$HOME/.local/state/daft/jobs/$REPO_ID"
      python3 - "$JOBS_DIR" <<'PY'
      import sys, json, os, datetime
      root = sys.argv[1]
      old = (datetime.datetime.utcnow() - datetime.timedelta(days=2)).strftime("%Y-%m-%dT%H:%M:%S.%fZ")
      for dirpath, _, files in os.walk(root):
          for f in files:
              if f != "meta.json":
                  continue
              p = os.path.join(dirpath, f)
              with open(p) as fh:
                  m = json.load(fh)
              for k in ("created_at", "started_at", "finished_at"):
                  if isinstance(m.get(k), str) and m.get(k):
                      m[k] = old
              with open(p, "w") as fh:
                  json.dump(m, fh)
      print("BACKDATE_OK")
      PY
    expect:
      exit_code: 0
      output_contains:
        - "BACKDATE_OK"

  - name: Run `daft hooks jobs clean` — daft-managed dirs are eligible
    run: daft hooks jobs clean 2>&1
    cwd: "$WORK_DIR/test-log-cleanup-custom-path/feature/cp"
    expect:
      exit_code: 0

  - name:
      The user-managed file at /tmp/daft-test-custom-log/build.log MUST still
      exist — cleanup never touches paths outside the state dir
    run: |
      [ -f /tmp/daft-test-custom-log/build.log ] || { echo "user log was deleted"; exit 1; }
      grep -q "custom-path-output" /tmp/daft-test-custom-log/build.log
      echo "USER_LOG_PRESERVED=1"
    expect:
      exit_code: 0
      output_contains:
        - "USER_LOG_PRESERVED=1"

  - name: Cleanup the custom log dir
    run: rm -rf /tmp/daft-test-custom-log
    expect:
      exit_code: 0
