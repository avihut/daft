name: Hooks trust list format error cases
description: Invalid format values and flag conflicts are rejected

steps:
  - name: --format bogus is rejected by clap
    run: daft hooks trust list --format bogus 2>&1
    expect:
      exit_code: 2
      output_contains:
        - "invalid value"

  - name: --format and --template conflict
    run: "daft hooks trust list --format json --template 'x' 2>&1"
    expect:
      exit_code: 2
      output_contains:
        - "cannot be used with"
