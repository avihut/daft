name: Hooks run listing JSON format
description: daft hooks run --format json (no hook type) emits hook list as JSON

repos:
  - name: test-hooks-run-json
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# Hooks run JSON format test"
        commits:
          - message: "Initial commit"
    daft_yml: |
      hooks:
        worktree-post-create:
          jobs:
            - name: setup
              run: echo done

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_HOOKS_RUN_JSON
    expect:
      exit_code: 0

  - name: JSON output lists available hooks
    run: daft hooks run --format json 2>&1
    cwd: "$WORK_DIR/test-hooks-run-json/main"
    expect:
      exit_code: 0
      output_contains:
        - '"worktree-post-create"'
        - '"job_name"'
