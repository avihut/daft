name: daft run executes even in an untrusted repo (explicit consent)
description:
  "Unlike lifecycle hooks — which are skipped in an untrusted repo — an explicit
  `daft run` counts as consent and runs, printing a soft hint that trusting the
  repo also lets lifecycle hooks fire automatically."

repos:
  - name: run-untrusted
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# run untrusted"
        commits:
          - message: "Initial commit"
    daft_yml: |
      tasks:
        run:
          jobs:
            - name: serve
              run: echo ran-despite-untrusted > .ran
        emit:
          jobs:
            - name: emit
              run: printf 'CLEAN-PASSTHROUGH-STDOUT\n'

steps:
  - name: Clone the repository (do NOT trust it)
    run: git-worktree-clone --layout contained $REMOTE_RUN_UNTRUSTED
    expect:
      exit_code: 0

  # The .ran marker proves the task ran despite the repo being untrusted; the
  # trust hint comes from CliOutput (not the DAFT_TESTING-hidden renderer).
  - name: daft run executes and nudges the user to trust the repo
    run: daft run 2>&1
    cwd: "$WORK_DIR/run-untrusted/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/run-untrusted/main/.ran"
      output_contains:
        - "not in your trust list"
        - "hooks trust"

  # Regression: the trust hint must land on STDERR, not STDOUT — a single-job
  # passthrough's stdout is its interface (verbatim, like running the command
  # yourself). Redirect the job's stdout to a file; bash `>` isolates stdout
  # from the hint (now on stderr), so the marker is captured but the hint must
  # never leak into it. Before the fix the 3-line hint prepended to stdout.
  - name: The trust hint stays off a single-job passthrough's stdout
    run: daft run emit > $WORK_DIR/run-untrusted/main/out.txt
    cwd: "$WORK_DIR/run-untrusted/main"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/run-untrusted/main/out.txt"
          content: "CLEAN-PASSTHROUGH-STDOUT"
      file_not_contains:
        - path: "$WORK_DIR/run-untrusted/main/out.txt"
          content: "not in your trust list"
