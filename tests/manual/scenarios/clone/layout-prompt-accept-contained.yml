name: Layout prompt accepted uses contained layout
description:
  When the user answers "y" to the layout prompt, the clone should use the
  contained layout.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone and accept contained layout
    run: echo "y" | git-worktree-clone $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "Use contained?"

  - name: Verify contained layout was used
    run: "true"
    expect:
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main
