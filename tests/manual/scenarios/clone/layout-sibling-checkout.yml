name: Sibling layout checkout existing branch
description:
  Clone with sibling layout, then checkout an existing branch and verify the
  worktree lands as a sibling directory

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with sibling layout
    run: git-worktree-clone --layout sibling $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo"
          branch: main

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo.develop"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo.develop"
          branch: develop
