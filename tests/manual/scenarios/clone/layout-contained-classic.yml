name: Clone with contained-classic layout
description:
  Clone with --layout contained-classic creates a wrapped non-bare repo where
  the default branch is a regular clone inside a wrapper directory

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained-classic layout
    run: git-worktree-clone --layout contained-classic $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/main"
        - "$WORK_DIR/test-repo/main/.git"
      files_exist:
        - "$WORK_DIR/test-repo/main/README.md"
        - "$WORK_DIR/test-repo/main/main.py"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main

  - name: Checkout existing branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/develop"
          branch: develop

  - name: Start new branch (daft start)
    run: git-worktree-checkout --start my-feature
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/my-feature"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/my-feature"
          branch: my-feature
