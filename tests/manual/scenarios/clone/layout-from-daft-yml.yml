name: Clone auto-transforms to daft.yml layout
description:
  When a cloned repo has daft.yml with a layout field and no --layout flag was
  given, daft should auto-transform to that layout after clone.

repos:
  - name: test-repo
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# test-repo"
        commits:
          - message: "Initial commit"
    daft_yml: |
      layout: contained

steps:
  - name: Clone without --layout flag
    run: git-worktree-clone $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "Transforming"
        - "contained"

  - name: Verify repo was auto-transformed to contained (bare) layout
    run: "true"
    expect:
      dirs_exist:
        - "$WORK_DIR/test-repo/main"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main

  - name: Verify repos.json stores contained
    run: NO_COLOR=1 daft layout show 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "contained"
        - "repo setting"
