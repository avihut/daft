name: Clone by catalog name
description:
  daft clone <name> re-clones a known (here removed) repo from its recorded
  remote URL — repo remove becomes reversible

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone by URL
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Remove the repo
    run: daft repo remove -y test-repo 2>&1
    expect:
      exit_code: 0
      output_not_contains:
        - "error"

  - name: Re-clone it by catalog name
    run: git-worktree-clone --layout contained test-repo 2>&1
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: The restored repo is live again
    run: daft repo list
    expect:
      exit_code: 0
      output_contains:
        - "test-repo"
