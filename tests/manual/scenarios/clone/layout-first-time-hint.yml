name: First clone with default layout shows layout hint
description:
  On the first ever daft clone using the default layout (sibling), daft should
  show a one-time hint about available layouts. The hint should not appear on
  subsequent clones.

repos:
  - name: test-repo-1
    use_fixture: standard-remote
  - name: test-repo-2
    use_fixture: standard-remote

steps:
  - name: First clone shows layout hint
    run: git-worktree-clone $REMOTE_TEST_REPO_1 2>&1
    expect:
      exit_code: 0
      output_contains:
        - "layout"
        - "daft layout list"

  - name: Second clone does not show layout hint
    run: git-worktree-clone $REMOTE_TEST_REPO_2 2>&1
    expect:
      exit_code: 0
      output_not_contains:
        - "daft layout list"
