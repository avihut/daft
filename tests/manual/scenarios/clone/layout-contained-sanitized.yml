name: Clone with contained-sanitized layout
description:
  Clone with --layout contained-sanitized creates a bare repo where branch
  slashes are flattened to dashes in worktree directory names

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with contained-sanitized layout
    run: git-worktree-clone --layout contained-sanitized $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
        - "$WORK_DIR/test-repo/main"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main

  - name: Checkout a branch with slashes
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature-test-feature"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/feature-test-feature"
          branch: feature/test-feature
