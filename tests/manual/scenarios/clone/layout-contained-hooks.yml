name: Contained clone fires both hooks
description:
  For contained-layout clones, both post-clone and worktree-post-create should
  fire. post-clone fires once for the clone operation, and worktree-post-create
  fires for the worktree created during clone.

repos:
  - name: test-repo
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# test-repo"
        commits:
          - message: "Initial commit"
    daft_yml: |
      hooks:
        post-clone:
          jobs:
            - name: clone-marker
              run: touch "$DAFT_WORKTREE_PATH/.clone-hook-ran"
        worktree-post-create:
          jobs:
            - name: create-marker
              run: touch "$DAFT_WORKTREE_PATH/.create-hook-ran"

steps:
  - name: Clone with contained layout and trust hooks
    run:
      git-worktree-clone --layout contained --trust-hooks $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0

  - name: Verify post-clone fired
    run: "true"
    expect:
      files_exist:
        - "$WORK_DIR/test-repo/main/.clone-hook-ran"

  - name: Verify worktree-post-create fired during clone
    run: "true"
    expect:
      files_exist:
        - "$WORK_DIR/test-repo/main/.create-hook-ran"
