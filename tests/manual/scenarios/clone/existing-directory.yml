name: "Clone fails when directory exists"
description:
  "Cloning into an already-existing directory fails with a non-zero exit code."

repos:
  - name: test-repo-existing
    use_fixture: standard-remote

steps:
  - name: "Create a directory that will conflict"
    run: "mkdir -p test-repo-existing"
    expect:
      exit_code: 0

  - name: "Attempt to clone into existing directory"
    run: "git-worktree-clone $REMOTE_TEST_REPO_EXISTING 2>&1"
    expect:
      exit_code: 1
