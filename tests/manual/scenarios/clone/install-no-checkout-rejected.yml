name: Clone --no-checkout --install is rejected
description:
  --install needs a worktree to write daft.yml into, so combining it with
  --no-checkout (which creates none) fails up front, before cloning.

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone --no-checkout --install
    run:
      git-worktree-clone --layout contained --no-checkout --install
      $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 1
      output_contains:
        - "cannot be used together"
