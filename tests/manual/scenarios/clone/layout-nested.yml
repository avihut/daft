name: Clone with nested layout
description:
  Clone with --layout nested creates a regular repo with worktrees in
  .worktrees/

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with nested layout
    run: git-worktree-clone --layout nested $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
      files_exist:
        - "$WORK_DIR/test-repo/README.md"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo"
          branch: main
