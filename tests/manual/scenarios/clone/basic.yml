name: Clone basic
description: Basic clone creates bare repo with default branch worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
        - "$WORK_DIR/test-repo/main"
      files_exist:
        - "$WORK_DIR/test-repo/main/README.md"
        - "$WORK_DIR/test-repo/main/main.py"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/main"
          branch: main
