name: Sibling clone fires both post-clone and worktree-post-create
description:
  For non-bare clones, both post-clone and worktree-post-create hooks should
  fire since the clone both creates the repo and results in a working directory.

repos:
  - name: test-repo
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# test-repo"
        commits:
          - message: "Initial commit"
    daft_yml: |
      hooks:
        post-clone:
          jobs:
            - name: clone-marker
              run: touch "$DAFT_WORKTREE_PATH/.clone-hook-ran"
        worktree-post-create:
          jobs:
            - name: create-marker
              run: touch "$DAFT_WORKTREE_PATH/.create-hook-ran"

steps:
  - name: Clone with sibling layout and trust hooks
    run:
      git-worktree-clone --layout sibling --trust-hooks $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0

  - name: Verify both hooks fired
    run: "true"
    expect:
      files_exist:
        - "$WORK_DIR/test-repo/.clone-hook-ran"
        - "$WORK_DIR/test-repo/.create-hook-ran"
