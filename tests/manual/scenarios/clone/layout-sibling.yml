name: Clone with sibling layout
description: Clone with --layout sibling creates a regular (non-bare) repo

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with sibling layout
    run: git-worktree-clone --layout sibling $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo"
        - "$WORK_DIR/test-repo/.git"
      files_exist:
        - "$WORK_DIR/test-repo/README.md"
        - "$WORK_DIR/test-repo/main.py"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo"
          branch: main
