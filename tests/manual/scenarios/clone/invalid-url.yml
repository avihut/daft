name: "Clone with invalid URL"
description:
  "Cloning a nonexistent local path fails gracefully without leaving artifacts."

steps:
  - name: "Attempt to clone a nonexistent path"
    run:
      "git-worktree-clone --layout contained /nonexistent/path/to/repo.git 2>&1"
    expect:
      exit_code: 1

  - name: "Verify no directory was created"
    run: "test ! -d repo"
    expect:
      exit_code: 0
