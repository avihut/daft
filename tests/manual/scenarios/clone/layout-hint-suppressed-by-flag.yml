name: Layout prompt not shown when --layout flag is used
description:
  When the user explicitly specifies a layout via --layout, the first-time
  layout prompt should not appear (the user already knows about layouts).

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone with explicit --layout flag
    run: git-worktree-clone --layout sibling $REMOTE_TEST_REPO 2>&1
    expect:
      exit_code: 0
      output_not_contains:
        - "[y/N]"
