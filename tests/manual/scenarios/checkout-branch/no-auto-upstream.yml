name: Checkout branch no auto upstream
description:
  "New branch does not auto-track remote when checkout.push is disabled
  (default)"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create new branch (push disabled by default)
    run: git-worktree-checkout -b feature/local-only
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/local-only"

  - name: Verify no upstream tracking was set
    run: |
      result=$(git config branch.feature/local-only.remote 2>/dev/null || true)
      test -z "$result" && echo "NO_UPSTREAM"
    cwd: "$WORK_DIR/test-repo/feature/local-only"
    expect:
      exit_code: 0
      output_contains:
        - "NO_UPSTREAM"
