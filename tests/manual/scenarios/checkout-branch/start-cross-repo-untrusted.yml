name: Start cross-repo honors the target repo's trust
description:
  creating a branch in another cataloged repo runs THAT repo's daft.yml hooks
  under its own trust — an untrusted target creates the worktree but skips the
  hooks with the centralized notice, and no hook side effects appear

repos:
  - name: test-repo-a
    use_fixture: standard-remote
  - name: test-repo-hooks
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# hooks target"
        commits:
          - message: "Initial commit"
    daft_yml: |
      hooks:
        worktree-pre-create:
          jobs:
            - name: pre
              run: touch "$DAFT_SOURCE_WORKTREE/.pre-ran"
        worktree-post-create:
          jobs:
            - name: post
              run: touch "$DAFT_WORKTREE_PATH/.post-ran"

steps:
  - name: Clone both repos
    run:
      git-worktree-clone --layout contained $REMOTE_TEST_REPO_A &&
      git-worktree-clone --layout contained $REMOTE_TEST_REPO_HOOKS
    expect:
      exit_code: 0

  - name: Cross-repo start skips the untrusted target's hooks with a notice
    run: daft start test-repo-hooks feat-h 2>&1
    cwd: "$WORK_DIR/test-repo-a/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo-hooks/feat-h"
      output_contains:
        - "Creating branch 'feat-h' in 'test-repo-hooks'"
        - "Untrusted repo — 2 daft.yml hooks not run: worktree-pre-create,
          worktree-post-create"
        - "daft hooks trust"
      files_not_exist:
        - "$WORK_DIR/test-repo-hooks/feat-h/.post-ran"
        - "$WORK_DIR/test-repo-hooks/main/.pre-ran"
