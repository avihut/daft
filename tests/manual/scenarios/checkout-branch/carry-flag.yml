name: Checkout branch carry flag
description: "--carry copies files to new branch worktree"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create file in main worktree
    run:
      echo "explicit carry content" > $WORK_DIR/test-repo/main/explicit_file.txt

  - name: Create branch with explicit --carry flag
    run: git-worktree-checkout -b --carry feature/explicit-carry
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/feature/explicit-carry/explicit_file.txt"
      file_contains:
        - path: "$WORK_DIR/test-repo/feature/explicit-carry/explicit_file.txt"
          content: "explicit carry content"
