name: Checkout branch from subdirectory
description: "-b works when run from inside a worktree subdirectory"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create subdirectory and checkout-branch from there
    run: |
      mkdir -p $WORK_DIR/test-repo/main/subdir &&
      cd $WORK_DIR/test-repo/main/subdir &&
      git-worktree-checkout -b feature/from-subdir
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/from-subdir"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/feature/from-subdir"
          branch: feature/from-subdir
