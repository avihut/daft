name: Checkout branch workflow
description: "Create branch, commit content, then create another branch from it"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create first branch
    run: git-worktree-checkout -b feature/base-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/base-feature"

  - name: Add and commit content in first branch
    run: |
      echo "Base feature implementation" > base.txt &&
      git add base.txt &&
      git commit -m "Add base feature"
    cwd: "$WORK_DIR/test-repo/feature/base-feature"
    expect:
      exit_code: 0

  - name: Create second branch from first
    run: git-worktree-checkout -b feature/extended-feature feature/base-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/base-feature"
        - "$WORK_DIR/test-repo/feature/extended-feature"
      files_exist:
        - "$WORK_DIR/test-repo/feature/extended-feature/base.txt"
