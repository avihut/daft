name: Checkout branch security
description: "Rejects path traversal in branch names"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Reject path traversal with ../
    run: git-worktree-checkout -b '../../../etc/passwd' 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1

  - name: Reject Windows-style path traversal
    run: git-worktree-checkout -b '..\..\..\windows\system32' 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
