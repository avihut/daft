name: Checkout branch direnv
description: "-b handles .envrc files gracefully"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create branch worktree
    run: git-worktree-checkout -b feature/with-envrc
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/with-envrc"

  - name: Add .envrc file to worktree
    run:
      echo "export TEST_VAR=feature_value" >
      $WORK_DIR/test-repo/feature/with-envrc/.envrc
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/feature/with-envrc/.envrc"
      file_contains:
        - path: "$WORK_DIR/test-repo/feature/with-envrc/.envrc"
          content: "TEST_VAR=feature_value"
