name: Checkout branch with base
description: "-b branch basebranch creates new branch from specific base"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch first
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"

  - name: Create new branch from develop base
    run: git-worktree-checkout -b feature/from-develop develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/from-develop"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/feature/from-develop"
          branch: feature/from-develop
