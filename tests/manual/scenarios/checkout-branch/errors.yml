name: Checkout branch errors
description:
  "-b fails without name, with invalid names, existing branches, and nonexistent
  base"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Fail without branch name
    run: git-worktree-checkout -b 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 2

  - name: Fail with invalid branch name (spaces)
    run: git-worktree-checkout -b 'invalid branch name' 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1

  - name: Create a branch first
    run: git-worktree-checkout -b feature/test
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Fail with existing branch
    run: git-worktree-checkout -b feature/test 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1

  - name: Fail with nonexistent base branch
    run: git-worktree-checkout -b feature/test2 nonexistent-base 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
