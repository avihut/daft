name: Checkout branch carry skip no worktree
description: "--carry from project root (no current worktree) skips gracefully"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Add uncommitted changes in main worktree
    run: echo "main changes" > $WORK_DIR/test-repo/main/main_file.txt

  - name: Create branch from develop (which has no worktree)
    run: git-worktree-checkout -b feature/from-remote-only develop
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/feature/from-remote-only/main_file.txt"
      files_exist:
        - "$WORK_DIR/test-repo/main/main_file.txt"
