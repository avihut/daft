name: Checkout branch basic
description: "-b creates new branch and worktree from current branch"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Create new branch with -b
    run: git-worktree-checkout -b feature/new-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/new-feature"
      is_git_worktree:
        - dir: "$WORK_DIR/test-repo/feature/new-feature"
          branch: feature/new-feature
