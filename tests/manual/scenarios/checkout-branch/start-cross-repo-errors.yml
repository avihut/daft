name: Start cross-repo guardrails
description:
  the two-name guess never overrides local meaning — an existing local branch
  named like a cataloged repo fails fast with the --repo hint; --repo still
  reaches the shadowed repo; a three-name catalog miss, a missing base in the
  target, carry across repos, '-', and --repo with a third name all error
  without creating anything

repos:
  - name: test-repo-a
    use_fixture: standard-remote
  - name: test-repo-b
    use_fixture: standard-remote

steps:
  - name: Clone both repos
    run:
      git-worktree-clone --layout contained $REMOTE_TEST_REPO_A &&
      git-worktree-clone --layout contained $REMOTE_TEST_REPO_B
    expect:
      exit_code: 0

  - name: A single name is always a local branch, even a repo's
    run: daft start test-repo-b 2>&1
    cwd: "$WORK_DIR/test-repo-a/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo-a/test-repo-b"
      output_not_contains:
        - "Creating branch"

  - name: The local branch now blocks the guess, pointing at --repo
    run: daft start test-repo-b feat-c 2>&1
    cwd: "$WORK_DIR/test-repo-a/main"
    expect:
      exit_code: 1
      output_contains:
        - "branch 'test-repo-b' already exists in this repository"
        - "daft start --repo test-repo-b feat-c"
      files_not_exist:
        - "$WORK_DIR/test-repo-b/feat-c"

  - name: --repo still reaches the shadowed repo
    run: daft start --repo test-repo-b feat-c 2>&1
    cwd: "$WORK_DIR/test-repo-a/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo-b/feat-c"
      output_contains:
        - "Creating branch 'feat-c' in 'test-repo-b'"

  - name: Three names hard-error on a catalog miss
    run: daft start nosuch feat main 2>&1
    cwd: "$WORK_DIR/test-repo-a/main"
    expect:
      exit_code: 1
      output_contains:
        - "not found in the catalog"
        - "three arguments mean"

  - name: The base must exist in the target repo
    run: daft start test-repo-a feat-nb no-such-base 2>&1
    cwd: "$WORK_DIR/test-repo-b/main"
    expect:
      exit_code: 1
      files_not_exist:
        - "$WORK_DIR/test-repo-a/feat-nb"

  - name: Carry cannot cross repositories
    run: daft start test-repo-a feat-cc -c 2>&1
    cwd: "$WORK_DIR/test-repo-b/main"
    expect:
      exit_code: 1
      output_contains:
        - "cannot cross repositories"
      files_not_exist:
        - "$WORK_DIR/test-repo-a/feat-cc"

  - name: --repo rejects a third name
    run: daft start --repo test-repo-b feat-t base extra 2>&1
    cwd: "$WORK_DIR/test-repo-a/main"
    expect:
      exit_code: 1
      output_contains:
        - "--repo already names the target repo"

  - name: A dash is not a branch name
    run: daft start - 2>&1
    cwd: "$WORK_DIR/test-repo-a/main"
    expect:
      exit_code: 1
      output_contains:
        - "previous worktree"
