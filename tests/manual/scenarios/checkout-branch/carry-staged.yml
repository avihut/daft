name: Checkout branch carry staged
description: "--carry carries staged changes to new branch worktree"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create and stage a file in main worktree
    run: |
      cd $WORK_DIR/test-repo/main &&
      echo "staged content" > staged_file.txt &&
      git add staged_file.txt

  - name: Create branch (default carries staged changes)
    run: git-worktree-checkout -b feature/carry-staged
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/feature/carry-staged/staged_file.txt"
      file_contains:
        - path: "$WORK_DIR/test-repo/feature/carry-staged/staged_file.txt"
          content: "staged content"
      files_not_exist:
        - "$WORK_DIR/test-repo/main/staged_file.txt"
