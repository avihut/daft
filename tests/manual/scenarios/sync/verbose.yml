name: Sync with --verbose
description: --verbose flag works without errors

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Run sync with --verbose
    run: git-sync --verbose 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
