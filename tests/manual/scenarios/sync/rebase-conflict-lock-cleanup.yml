name: "Sync rebase conflict cleans lock files"
description:
  "When rebase conflicts, sync should clean up lock files and abort cleanly"

repos:
  - name: lock-test-repo
    use_fixture: standard-remote

steps:
  - name: "Clone the repository"
    run: "git-worktree-clone $REMOTE_LOCK_TEST_REPO"
    expect:
      exit_code: 0

  - name: "Checkout develop branch"
    run: "git-worktree-checkout develop"
    cwd: "$WORK_DIR/lock-test-repo/main"
    expect:
      exit_code: 0

  - name: "Make conflicting local commit on develop"
    run: |
      cd develop
      echo "develop conflicting content" > README.md
      git add README.md
      git commit -m "Conflicting change on develop"
    cwd: "$WORK_DIR/lock-test-repo"
    expect:
      exit_code: 0

  - name: "Push conflicting change to main on remote"
    run: |
      tmp=$(mktemp -d)
      git clone "$REMOTE_LOCK_TEST_REPO" "$tmp" 2>/dev/null
      cd "$tmp"
      echo "main conflicting content" > README.md
      git add README.md
      git commit -m "Conflicting change on main" 2>/dev/null
      git push origin main 2>/dev/null
      rm -rf "$tmp"
    expect:
      exit_code: 0

  - name: "Create stale index.lock to simulate crashed process"
    run: |
      git_dir=$(cd develop && git rev-parse --git-dir)
      touch "$git_dir/index.lock"
      test -f "$git_dir/index.lock"
    cwd: "$WORK_DIR/lock-test-repo"
    expect:
      exit_code: 0

  - name: "Run sync with --rebase (should clean lock and handle conflict)"
    run: "git-worktree-sync --rebase main --verbose --verbose 2>&1 || true"
    cwd: "$WORK_DIR/lock-test-repo/main"
    expect:
      exit_code: 0

  - name: "Verify index.lock was cleaned up"
    run: |
      git_dir=$(cd develop && git rev-parse --git-dir)
      test ! -f "$git_dir/index.lock"
    cwd: "$WORK_DIR/lock-test-repo"
    expect:
      exit_code: 0

  - name: "Verify develop worktree is on its branch (not detached)"
    run: |
      cd develop
      branch=$(git symbolic-ref --short HEAD 2>/dev/null || echo "DETACHED")
      echo "branch=$branch"
      [ "$branch" = "develop" ]
    cwd: "$WORK_DIR/lock-test-repo"
    expect:
      exit_code: 0
