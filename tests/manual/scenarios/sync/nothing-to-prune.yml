name: Sync with nothing to prune
description: Sync with nothing to prune still fetches and updates worktrees

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"

  - name: Push remote changes to develop
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git checkout develop 2>/dev/null
      echo "Sync no prune update" >> README.md
      git add README.md
      git commit -m "Update for sync no-prune test"
      git push origin develop
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Run sync (nothing to prune, should still update)
    run: git-worktree-sync 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"
        - "$WORK_DIR/test-repo/main"

  - name: Verify develop was updated
    run: grep -q "Sync no prune update" $WORK_DIR/test-repo/develop/README.md
    expect:
      exit_code: 0
