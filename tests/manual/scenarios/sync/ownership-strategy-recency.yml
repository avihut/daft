name: Sync ownership strategy recency
description:
  "With the default recency-plurality strategy, a branch where the user authored
  most commits is still rebased even if a teammate wrote the tip."

repos:
  - name: sync-rec-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_SYNC_REC_REPO
    expect:
      exit_code: 0

  - name: Configure user identity
    run: |
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
    cwd: "$WORK_DIR/sync-rec-repo/main"
    expect:
      exit_code: 0

  - name:
      Checkout feature/test-feature and stack commits; teammate writes the tip
    run: |
      git-worktree-checkout feature/test-feature
      cd $WORK_DIR/sync-rec-repo/feature/test-feature
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
      for i in 1 2 3; do
        echo "me $i" > "me-$i.txt"
        git add "me-$i.txt"
        GIT_AUTHOR_NAME="Me Testuser" GIT_AUTHOR_EMAIL="me@example.com" \
        GIT_COMMITTER_NAME="Me Testuser" GIT_COMMITTER_EMAIL="me@example.com" \
          git commit -m "me $i"
      done
      echo "bob tip" > bob.txt
      git add bob.txt
      GIT_AUTHOR_NAME="Bob" GIT_AUTHOR_EMAIL="bob@example.com" \
      GIT_COMMITTER_NAME="Bob" GIT_COMMITTER_EMAIL="bob@example.com" \
        git commit -m "bob tip"
    cwd: "$WORK_DIR/sync-rec-repo/main"
    expect:
      exit_code: 0

  - name: Advance main on remote with a non-conflicting change
    run: |
      temp=$(mktemp -d)
      git clone "$REMOTE_SYNC_REC_REPO" "$temp" 2>/dev/null
      cd "$temp"
      echo "remote change" > r.txt
      git add r.txt
      GIT_AUTHOR_EMAIL="other@example.com" GIT_COMMITTER_EMAIL="other@example.com" \
        git commit -m "advance main"
      git push origin main 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Record feature hash before sync
    run: git rev-parse HEAD > /tmp/daft-sync-rec-before
    cwd: "$WORK_DIR/sync-rec-repo/feature/test-feature"
    expect:
      exit_code: 0

  - name:
      Sync with --rebase main (default strategy picks feature/test-feature as
      owned)
    run: git-worktree-sync --rebase main --verbose --verbose 2>&1 || true
    cwd: "$WORK_DIR/sync-rec-repo/main"
    expect:
      exit_code: 0

  - name: Feature branch WAS rebased (hash changed)
    run: |
      before=$(cat /tmp/daft-sync-rec-before)
      after=$(git rev-parse HEAD)
      echo "before=$before after=$after"
      [ "$before" != "$after" ]
    cwd: "$WORK_DIR/sync-rec-repo/feature/test-feature"
    expect:
      exit_code: 0
