name: Sync help and version
description: Help and version flags work for git-worktree-sync

steps:
  - name: git-worktree-sync --help exits successfully
    run: git-worktree-sync --help 2>&1
    expect:
      exit_code: 0

  - name: git-worktree-sync --version exits successfully
    run: git-worktree-sync --version 2>&1
    expect:
      exit_code: 0
