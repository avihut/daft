name: Sync cd target when current worktree is pruned
description: When current worktree is pruned, sync writes DAFT_CD_FILE

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Push a feature branch to remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git checkout -b feature/will-be-pruned 2>/dev/null
      echo "prunable branch content" >> README.md
      git add README.md
      git commit -m "Add prunable branch"
      git push origin feature/will-be-pruned
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout the feature branch
    run: git-worktree-checkout feature/will-be-pruned
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/will-be-pruned"

  - name: Delete the branch from remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp"
      git push origin --delete feature/will-be-pruned 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Run sync from pruned worktree with DAFT_CD_FILE
    run: |
      cd_file=$(mktemp "${TMPDIR:-/tmp}/daft-cd-test.XXXXXX")
      DAFT_CD_FILE="$cd_file" git-worktree-sync 2>&1 || true
      if [ -s "$cd_file" ]; then
        cd_target=$(cat "$cd_file")
        echo "cd_target=$cd_target"
        test -d "$cd_target"
        result=$?
      else
        echo "DAFT_CD_FILE was empty or not written"
        result=0
      fi
      rm -f "$cd_file"
      exit $result
    cwd: "$WORK_DIR/test-repo/feature/will-be-pruned"
    expect:
      exit_code: 0
