name: Sync include unowned
description:
  "--include unowned causes all branches to be rebased, including unowned ones"

repos:
  - name: include-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_INCLUDE_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/include-repo/main"

  - name: Set local user email to current user
    run: git config user.email "me@example.com"
    cwd: "$WORK_DIR/include-repo/main"
    expect:
      exit_code: 0

  - name: Checkout feature branch as the unowned branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/include-repo/main"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/include-repo/feature/test-feature"

  - name: Make a commit on feature branch owned by other user (no conflict)
    run: |
      echo "other user change" > other.txt
      git add other.txt
      GIT_AUTHOR_EMAIL="other@example.com" GIT_COMMITTER_EMAIL="other@example.com" \
        git commit -m "Unowned commit on feature"
    cwd: "$WORK_DIR/include-repo/feature/test-feature"
    expect:
      exit_code: 0

  - name: Advance main on remote with a non-conflicting change
    run: |
      temp=$(mktemp -d)
      git clone "$REMOTE_INCLUDE_REPO" "$temp" 2>/dev/null
      cd "$temp"
      echo "remote main change" > remote-advance.txt
      git add remote-advance.txt
      git commit -m "Advance main on remote" 2>/dev/null
      git push origin main 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Record feature branch commit hash before sync
    run: git rev-parse HEAD > /tmp/daft-include-feature-before
    cwd: "$WORK_DIR/include-repo/feature/test-feature"
    expect:
      exit_code: 0

  - name: Run sync with --rebase main --include unowned
    run:
      git-worktree-sync --rebase main --include unowned --verbose --verbose 2>&1
    cwd: "$WORK_DIR/include-repo/main"
    expect:
      exit_code: 0

  - name: Verify unowned feature branch WAS rebased (commit hash changed)
    run: |
      before=$(cat /tmp/daft-include-feature-before)
      after=$(git rev-parse HEAD)
      echo "before=$before after=$after"
      [ "$before" != "$after" ]
    cwd: "$WORK_DIR/include-repo/feature/test-feature"
    expect:
      exit_code: 0
