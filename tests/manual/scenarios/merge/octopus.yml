name: Merge octopus success
description: "daft merge of multiple sources invokes octopus and announces it"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create two non-conflicting feature branches from main
    run: |
      cd $WORK_DIR/test-repo/main
      git checkout -b feat-a
      echo "a" > file-a.txt
      git add file-a.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "feat a"
      git checkout main
      git checkout -b feat-b
      echo "b" > file-b.txt
      git add file-b.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "feat b"
      git checkout main
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Octopus merge
    run: git-worktree-merge feat-a feat-b 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "2 sources"
        - "octopus"
        - "Merged feat-a, feat-b into main (commit "

  - name: Verify both feat-a and feat-b commits are reachable from main
    run: git log --oneline main
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "feat a"
        - "feat b"
