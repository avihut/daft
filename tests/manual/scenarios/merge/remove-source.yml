name: Merge with -r removes source worktree
description:
  "daft merge -r removes the source worktree after a successful merge, but
  leaves the source branch intact (only -rb deletes the branch)"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Create feature worktree
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: Verify feature worktree exists before merge
    run: test -d $WORK_DIR/test-repo/feature/test-feature && echo "wt_exists"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["wt_exists"]

  - name: Merge with -r
    run: git-worktree-merge feature/test-feature -r 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Merge complete."

  - name: Verify feature worktree was removed
    run: test ! -d $WORK_DIR/test-repo/feature/test-feature && echo "wt_removed"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["wt_removed"]

  - name: Verify source branch still exists (only -r, not -rb)
    run:
      git -C $WORK_DIR/test-repo/main show-ref --verify --quiet
      refs/heads/feature/test-feature && echo "branch_exists"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["branch_exists"]

  - name: Verify main contains feature commits
    run: git -C $WORK_DIR/test-repo/main log --oneline main
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Add feature branch"
