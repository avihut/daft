name: --squash style produces single-parent commit
description:
  "daft merge --squash --no-edit collapses source commits into a single squash
  commit on target. HEAD has 1 parent (no merge commit)."

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Materialize feature
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: Squash merge feature into main
    run: git-worktree-merge feature/test-feature --squash --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Squashed feature/test-feature into main (commit "

  - name: Verify HEAD has 1 parent (squash commit, not merge commit)
    run: |
      parents=$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')
      echo "parent_count=$parents"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "parent_count=1"
