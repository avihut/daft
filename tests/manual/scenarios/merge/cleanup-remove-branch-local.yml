name: -r removes source worktree and branch (local only)
description:
  "daft merge -r removes the source worktree AND deletes the source branch
  locally. When branch.deleteRemote=false (the default), no remote push is
  attempted."

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Confirm branch.deleteRemote is false (default)
    run: |
      val=$(git config --local branch.deleteRemote 2>/dev/null || echo "unset")
      echo "deleteRemote=$val"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "deleteRemote=unset"

  - name: Create feature worktree
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: Merge with -r
    run: git-worktree-merge feature/test-feature -r --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Merged feature/test-feature into main (commit "
        - "Deleted feature/test-feature (worktree, local branch)"

  - name: Verify source branch was deleted
    run: |
      if git -C $WORK_DIR/test-repo/main show-ref --verify --quiet \
        refs/heads/feature/test-feature; then echo "still_exists"; else echo "branch_deleted"; fi
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["branch_deleted"]

  - name: Verify source worktree was removed
    run: test ! -d $WORK_DIR/test-repo/feature/test-feature && echo "wt_removed"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["wt_removed"]
