name: Merge abort errors when no merge in progress
description:
  "daft merge --abort on a clean worktree errors with 'no in-progress merge'"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Attempt to abort a merge that doesn't exist
    run: git-worktree-merge --abort 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "no in-progress merge"
