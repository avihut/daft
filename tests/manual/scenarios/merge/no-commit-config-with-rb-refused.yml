name: daft.merge.commit=false config + -rb refused at runtime
description:
  "Setting daft.merge.commit=false in config and passing -rb on the CLI is the
  diagonal case the static guards miss; runtime check refuses before merge."
repos:
  - name: test-repo
    use_fixture: standard-remote
steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }
  - name: Materialize feature
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }
  - name: Set daft.merge.commit=false locally
    run: git config daft.merge.commit false
    cwd: "$WORK_DIR/test-repo/main"
    expect: { exit_code: 0 }
  - name: --squash -rb under daft.merge.commit=false should refuse
    run: git-worktree-merge feature/test-feature --squash -rb 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "daft.merge.commit"
        - "cleanup"
