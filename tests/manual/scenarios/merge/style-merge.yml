name: Default style always creates merge commit
description:
  "daft merge (no style flag) always creates a merge commit even when
  fast-forward is possible. HEAD has 2 parents after the merge."

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Checkout feature
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: Verify feature is ahead of main (FF would be possible)
    run: |
      git -C $WORK_DIR/test-repo/main merge-base --is-ancestor main feature/test-feature && echo "ff_eligible"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["ff_eligible"]

  - name: Merge with default style (no flag) — always creates merge commit
    run: git-worktree-merge feature/test-feature --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Merged feature/test-feature into main (commit "

  - name: Verify HEAD has 2 parents (merge commit, not fast-forward)
    run: |
      parents=$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')
      echo "parent_count=$parents"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "parent_count=2"
