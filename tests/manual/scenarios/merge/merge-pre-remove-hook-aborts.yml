name: Merge -r pre-remove hook failure emits warning and continues
description: "When a worktree-pre-remove hook exits non-zero, daft emits a
  warning but continues cleanup. The merge commit lands on the target, the
  worktree is removed, and the command exits 0.

  The daft.yml must live on the feature branch so it is present in the feature
  worktree at pre-remove time (hooks are discovered from the worktree being
  removed)."

repos:
  - name: test-repo
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# test-repo"
          - path: daft.yml
            content: |
              hooks:
                worktree-pre-remove:
                  jobs:
                    - name: always-fail
                      run: exit 1
        commits:
          - message: "Initial commit"
      - name: feature/test-feature
        from: main
        files:
          - path: feature.txt
            content: "feature content"
        commits:
          - message: "Add feature branch"

steps:
  - name: Clone with trust
    run: git-worktree-clone --layout contained --trust-hooks $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Materialize feature branch as a sibling worktree
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Merge with -r — pre-remove hook exits 1, command still exits 0
    run: git-worktree-merge feature/test-feature -r 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Merge complete."
        - "worktree-pre-remove hook failed with exit code 1"

  - name: Verify feature content landed on target (merge succeeded)
    run: test -f "$WORK_DIR/test-repo/main/feature.txt" && echo "feature_merged"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "feature_merged"

  - name: Verify source worktree was removed despite hook failure
    run: |
      git -C $WORK_DIR/test-repo/main worktree list --porcelain | grep "branch refs/heads/feature/test-feature" || echo "wt_removed"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["wt_removed"]
