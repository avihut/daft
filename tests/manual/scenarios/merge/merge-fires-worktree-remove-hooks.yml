name: Merge -r fires worktree-pre-remove hook
description:
  "daft merge -r delegates cleanup to branch_delete::execute, which fires the
  worktree-pre-remove hook before removing the source worktree AND deleting the
  source branch. The hooks config is committed to the source branch so the hook
  can be discovered in its worktree. Pre-remove executes while the worktree
  still exists, so the job's working directory is valid."

repos:
  - name: test-repo
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# test-repo"
          - path: daft.yml
            content: |
              hooks:
                worktree-pre-remove:
                  jobs:
                    - name: mark-pre
                      run: touch "$DAFT_PROJECT_ROOT/.pre-remove-ran"
        commits:
          - message: "Initial commit"
      - name: feature/test-feature
        from: main
        files:
          - path: feature.txt
            content: "feature content"
        commits:
          - message: "Add feature branch"

steps:
  - name: Clone with trust
    run: git-worktree-clone --layout contained --trust-hooks $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Materialize feature branch as a sibling worktree
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Merge with -r — pre-remove hook should fire during cleanup
    run: git-worktree-merge feature/test-feature -r --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Merged feature/test-feature into main (commit "
        - "Deleted feature/test-feature (worktree, local branch)"

  - name: Verify pre-remove hook ran (sentinel written to project root)
    run: test -f "$WORK_DIR/test-repo/.pre-remove-ran" && echo "pre_ran"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["pre_ran"]

  - name: Verify source worktree was removed (git has no worktree record)
    run: |
      git -C $WORK_DIR/test-repo/main worktree list --porcelain | grep "branch refs/heads/feature/test-feature" || echo "wt_removed"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["wt_removed"]

  - name: Verify source branch was deleted (-r removes both worktree and branch)
    run: |
      if git -C $WORK_DIR/test-repo/main show-ref --verify --quiet \
        refs/heads/feature/test-feature; then echo "branch_still_exists"; else echo "branch_deleted"; fi
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["branch_deleted"]
