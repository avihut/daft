name: Merge squash stages without committing
description:
  "daft merge --squash stages changes without creating a merge commit"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Checkout feature
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: Squash merge
    run: git-worktree-merge feature/test-feature --squash 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Verify changes staged but no MERGE_HEAD
    run: |
      real=$(git -C $WORK_DIR/test-repo/main rev-parse --absolute-git-dir)
      if [ -e "$real/MERGE_HEAD" ]; then
        echo "has_merge_head"
      else
        echo "no_merge_head"
      fi
      if git -C $WORK_DIR/test-repo/main diff --cached --quiet; then
        echo "no_staged"
      else
        echo "has_staged"
      fi
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "no_merge_head"
        - "has_staged"
