name: --rebase-merge style produces merge commit after rebase
description:
  "daft merge --rebase-merge --no-edit rebases source onto target then creates a
  merge commit. HEAD has 2 parents."

repos:
  - name: test-repo
    default_branch: main
    branches:
      - name: main
        files:
          - path: README.md
            content: "# test-repo"
        commits:
          - message: "Initial commit"
      - name: feature/test-feature
        from: main
        files:
          - path: feature.txt
            content: "feature content"
        commits:
          - message: "Add feature"

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Add a divergent commit on main so histories diverge
    run: |
      echo "main work" > main-work.txt
      git add main-work.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "main-side work"
    cwd: "$WORK_DIR/test-repo/main"
    expect: { exit_code: 0 }

  - name: Rebase-merge feature into main (branch ref only, no worktree needed)
    run: git-worktree-merge feature/test-feature --rebase-merge --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Merged feature/test-feature into main (commit "

  - name: Verify HEAD has 2 parents (merge commit after rebase)
    run: |
      parents=$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')
      echo "parent_count=$parents"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "parent_count=2"
