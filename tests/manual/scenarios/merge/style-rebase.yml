name: --rebase style produces linear history
description:
  "daft merge --rebase rebases source onto target then fast-forwards, producing
  a linear history. HEAD has 1 parent after the merge."

repos:
  - name: test-repo
    use_fixture: main-with-feature-branch

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Add a divergent commit on main so histories diverge
    run: |
      echo "main work" > main-work.txt
      git add main-work.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "main-side work"
    cwd: "$WORK_DIR/test-repo/main"
    expect: { exit_code: 0 }

  - name: Rebase merge feature into main (branch ref only, no worktree needed)
    run: git-worktree-merge feature/test-feature --rebase 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Fast-forwarded main to "

  - name: Verify HEAD has 1 parent (linear history after rebase)
    run: |
      parents=$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')
      echo "parent_count=$parents"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "parent_count=1"
