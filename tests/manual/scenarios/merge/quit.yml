name: Merge quit leaves working tree intact
description:
  "daft merge --quit clears MERGE_HEAD but does not reset the working tree"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a conflicting branch
    run: |
      git checkout -b conflict-src
      echo "a" > c.txt
      git add c.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "a"
      git checkout main
      echo "b" > c.txt
      git add c.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "b"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Trigger conflict via daft merge
    run: git-worktree-merge conflict-src --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1

  - name: Quit the merge
    run: git-worktree-merge --quit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name:
      Verify MERGE_HEAD gone but conflict markers (or staged entries) still
      present
    run: |
      GITDIR=$(git -C $WORK_DIR/test-repo/main rev-parse --absolute-git-dir)
      if [ -e "$GITDIR/MERGE_HEAD" ]; then
        echo "still_merging"
      else
        echo "merge_head_cleared"
      fi
      # --quit preserves the index; unlike --abort it does not reset staged
      # entries. We should see a non-clean `git status`.
      if git -C $WORK_DIR/test-repo/main diff --quiet && \
         git -C $WORK_DIR/test-repo/main diff --cached --quiet; then
        echo "index_empty"
      else
        echo "index_preserved"
      fi
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "merge_head_cleared"
        - "index_preserved"
