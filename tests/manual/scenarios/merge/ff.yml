name: Merge fast-forward default
description: "daft merge of a descendant branch fast-forwards by default"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Checkout feature
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: FF merge feature into main
    run: git-worktree-merge feature/test-feature 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Fast-forwarded main to "

  - name: Verify FF — HEAD has exactly one parent
    run: |
      parents=$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')
      echo "parent_count=$parents"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "parent_count=1"
