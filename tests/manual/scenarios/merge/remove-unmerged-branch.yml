name: Merge --squash -rb refuses branch deletion
description:
  "After --squash, the source branch's commits don't appear on the target (the
  squash creates a single new commit). Without --no-edit/-m, the TTY guard
  refuses before any merge work because a non-TTY context cannot open an editor
  for the squash commit. The worktree and branch are untouched."

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Create feature worktree
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name:
      Add a local-only commit on feature so its tip is ahead of its upstream.
    run: |
      echo "local extra" > local-only.txt
      git add local-only.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "local-only commit"
    cwd: "$WORK_DIR/test-repo/feature/test-feature"
    expect: { exit_code: 0 }

  - name:
      Squash merge with -rb without --no-edit — TTY guard refuses before merge
    run: git-worktree-merge feature/test-feature --squash -rb 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "No TTY available"
        - "--no-edit"

  - name: Verify worktree is still present (no merge work ran)
    run: test -d $WORK_DIR/test-repo/feature/test-feature && echo "wt_present"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["wt_present"]

  - name: Verify source branch still exists
    run:
      git -C $WORK_DIR/test-repo/main show-ref --verify --quiet
      refs/heads/feature/test-feature && echo "branch_exists"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["branch_exists"]

  - name: Verify no staged changes on main (no merge ran)
    run: |
      git -C $WORK_DIR/test-repo/main diff --cached --quiet && echo "no_staged" || echo "has_staged"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["no_staged"]
