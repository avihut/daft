name:
  Merge with --adopt-target creates ephemeral worktree and removes it on success
description:
  "--adopt-target skips the prompt, runs the merge in a temp worktree, and
  cleans up after success"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create ref-only divergent target with non-conflicting change
    run: |
      # Author a commit on top of main via plumbing — no worktree materialized.
      # Then advance main on a different file so histories diverge but the
      # merge itself will not conflict.
      base=$(git rev-parse main)
      tree=$(git rev-parse main^{tree})
      side_sha=$(GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t \
                 GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
                 git commit-tree $tree -p $base -m "target-side commit")
      git update-ref refs/heads/target-no-wt $side_sha
      echo m > main-ahead.txt
      git add main-ahead.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "main ahead"
    cwd: "$WORK_DIR/test-repo/main"
    expect: { exit_code: 0 }

  - name: Merge with --adopt-target and no stdin — must not prompt
    # `</dev/null` forces non-TTY stdin. Without --adopt-target the Prompt
    # preset would refuse on non-TTY; with --adopt-target set the decision
    # is Yes without a prompt, so no prompt text appears in output.
    # Provide a commit message so git doesn't try to launch $EDITOR inside
    # the ephemeral worktree (stdin is /dev/null — the editor would fail).
    run:
      sh -c 'git-worktree-merge main --into target-no-wt --adopt-target -m
      "merge main into target-no-wt" </dev/null 2>&1'
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Merged main into target-no-wt (commit "
      output_not_contains:
        # "[y/N]" is unique to the interactive prompt; its absence proves
        # no prompt was shown. "auto-accepting" is the -y coercion log —
        # --adopt-target should not trigger it.
        - "[y/N]"
        - "auto-accepting"

  - name: Verify target-no-wt advanced to include "main ahead"
    run: git log --oneline target-no-wt
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "main ahead"
        - "target-side commit"

  - name: Verify the ephemeral worktree was cleaned up on success
    run: |
      # .daft-tmp is the temp-worktree parent; after a successful ephemeral
      # merge nothing should remain for the adopted branch.
      bare=$(git rev-parse --git-common-dir)
      test ! -e "$bare/.daft-tmp/target-no-wt" && echo "cleaned"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["cleaned"]

  - name: Verify no sibling worktree was materialized for the adopted branch
    run: test ! -d $WORK_DIR/test-repo/target-no-wt && echo "no_wt_dir"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["no_wt_dir"]
