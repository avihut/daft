name: --set-default writes style and cleanup to git config
description:
  "daft merge --squash --remove-branch --set-default writes
  daft.merge.style=squash and daft.merge.cleanup=remove-branch to git config
  --local and prints the Updated repository defaults notice."

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Materialize feature
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: Merge with --squash --remove-branch --set-default
    run:
      git-worktree-merge feature/test-feature --squash --remove-branch
      --set-default --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Squash merged and cleaned up feature/test-feature"
        - "Updated repository defaults"

  - name: Verify daft.merge.style was written to local config
    run: git config --local --get daft.merge.style
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "squash"

  - name: Verify daft.merge.cleanup was written to local config
    run: git config --local --get daft.merge.cleanup
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "remove-branch"
