name: Merge abort cross-worktree
description:
  "daft merge --abort <worktree> aborts a merge in a named worktree from
  elsewhere"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create conflict-src branch with a conflicting commit
    run: |
      git checkout -b conflict-src
      echo "a" > c.txt
      git add c.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "a"
      git checkout main
      echo "b" > c.txt
      git add c.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "b"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Materialize conflict-src as a sibling worktree
    run: git-worktree-checkout conflict-src
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Trigger conflict in main (from main)
    run: git-worktree-merge conflict-src --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1

  - name: Abort main's merge from the conflict-src worktree (cross-worktree)
    run: git-worktree-merge --abort main 2>&1
    cwd: "$WORK_DIR/test-repo/conflict-src"
    expect:
      exit_code: 0

  - name: Verify main has no in-progress merge
    run: |
      GITDIR=$(git -C $WORK_DIR/test-repo/main rev-parse --absolute-git-dir)
      if [ -e "$GITDIR/MERGE_HEAD" ]; then
        echo "dirty"
      else
        echo "clean"
      fi
    cwd: "$WORK_DIR/test-repo/conflict-src"
    expect:
      exit_code: 0
      output_contains:
        - "clean"
