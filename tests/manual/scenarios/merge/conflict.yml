name: Merge conflict report-and-stay
description:
  "daft merge reports the conflict target, files, and instructions on conflict"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create a conflicting branch
    run: |
      git checkout -b conflict-src
      echo "a" > c.txt
      git add c.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "a"
      git checkout main
      echo "b" > c.txt
      git add c.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "b"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0

  - name: Materialize conflict-src as a sibling worktree
    run: git-worktree-checkout conflict-src
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Merge cross-worktree — should conflict and report target + files
    run: git-worktree-merge conflict-src --into main --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/conflict-src"
    expect:
      exit_code: 1
      output_contains:
        # Target path names the TARGET (main), not the CWD (conflict-src).
        - "merge conflicted in"
        - "test-repo/main"
        - "conflicted files:"
        - "c.txt"
        - "daft merge --continue"
        - "daft merge --abort"

  - name: Clean up the in-progress merge in main
    run: git -C $WORK_DIR/test-repo/main merge --abort 2>/dev/null || true
    cwd: "$WORK_DIR/test-repo/conflict-src"
    expect:
      exit_code: 0
