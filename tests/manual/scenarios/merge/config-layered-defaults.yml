name: Merge respects daft.merge.style config
description:
  "daft.merge.style=squash turns plain `daft merge <src>` into a squash merge,
  with no CLI flag"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Checkout feature
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: Set local daft.merge.style=squash
    run: git config daft.merge.style squash
    cwd: "$WORK_DIR/test-repo/main"
    expect: { exit_code: 0 }

  - name: Merge feature (config should squash)
    run: git-worktree-merge feature/test-feature --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Squashed feature/test-feature into main (commit "

  - name: Verify main HEAD has one parent (squash commit)
    run: |
      parents=$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')
      echo "parent_count=$parents"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "parent_count=1"

  - name: Clear config
    run: git config --unset daft.merge.style
    cwd: "$WORK_DIR/test-repo/main"
    expect: { exit_code: 0 }
