name: Merge ff-only on non-ff refuses
description: "daft merge --ff-only fails when fast-forward is not possible"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Create divergent commit on main
    run: |
      cd $WORK_DIR/test-repo/main
      echo "local" > local-only.txt
      git add local-only.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "local-only on main"
    cwd: "$WORK_DIR/test-repo/main"
    expect: { exit_code: 0 }

  - name: Checkout feature
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: --ff-only refuses non-FF merge
    run: git-worktree-merge feature/test-feature --ff-only 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "Not possible to fast-forward"
