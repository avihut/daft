name: --squash --no-commit -r refused at parse time
description: "--no-commit conflicts with cleanup; cleanup needs a commit"
repos:
  - name: test-repo
    use_fixture: standard-remote
steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }
  - name: Attempt --squash --no-commit -r
    run: git-worktree-merge feature/test-feature --squash --no-commit -r 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 2
      output_contains:
        - "--no-commit"
        - "cannot be used"
