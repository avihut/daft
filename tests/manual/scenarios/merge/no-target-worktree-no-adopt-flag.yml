name: Merge with --no-adopt-target refuses without prompting
description:
  "--no-adopt-target beats the Prompt preset and refuses immediately, with no
  prompt text emitted"

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Create ref-only divergent target
    run: |
      base=$(git rev-parse main)
      tree=$(git rev-parse main^{tree})
      side_sha=$(GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t \
                 GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
                 git commit-tree $tree -p $base -m "target-side")
      git update-ref refs/heads/target-no-wt $side_sha
      echo m > main-ahead.txt
      git add main-ahead.txt
      GIT_AUTHOR_NAME=t GIT_AUTHOR_EMAIL=t@t GIT_COMMITTER_NAME=t GIT_COMMITTER_EMAIL=t@t \
        git commit -m "main ahead"
    cwd: "$WORK_DIR/test-repo/main"
    expect: { exit_code: 0 }

  - name: Merge with --no-adopt-target — refuses without prompting
    run:
      git-worktree-merge main --into target-no-wt --no-adopt-target --no-edit
      2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "no worktree"
        - "fast-forward"
      output_not_contains:
        # Prompt-only sentinel — the bail message also mentions "create an
        # ephemeral worktree" as part of its hint.
        - "[y/N]"

  - name: Verify no ephemeral worktree was left behind
    run: |
      bare=$(git rev-parse --git-common-dir)
      test ! -e "$bare/.daft-tmp/target-no-wt" && echo "clean"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["clean"]
