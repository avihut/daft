name: Default cleanup keeps source worktree and branch
description:
  "daft merge without any cleanup flag keeps both the source worktree and source
  branch intact after a successful merge."

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect: { exit_code: 0 }

  - name: Create feature worktree
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect: { exit_code: 0 }

  - name: Merge feature into main (no cleanup flag)
    run: git-worktree-merge feature/test-feature --no-edit 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Merged feature/test-feature into main (commit "

  - name: Verify source branch still exists
    run: |
      git -C $WORK_DIR/test-repo/main show-ref --verify --quiet \
        refs/heads/feature/test-feature && echo "branch_exists"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["branch_exists"]

  - name: Verify source worktree directory still exists
    run: test -d $WORK_DIR/test-repo/feature/test-feature && echo "wt_exists"
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains: ["wt_exists"]
