name:
  Prune keeps worktrees with refined daft files and summarizes; force discards
  to a stash
description: >
  feat/x refined its visitor daft.yml (added a named job). Prune is a batch
  command and never prompts: it must keep the worktree, explain why, and end
  with a consolidation summary pointing at `daft file merge`. A forced prune
  discards the refinement to .daft/discarded/ and never writes main's daft.yml
  (issue #628).

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Ignore daft files and push so new worktrees inherit the ignore
    run: |
      cd $WORK_DIR/test-repo/main
      printf 'daft.yml\ndaft.local.yml\n' > .gitignore
      git add .gitignore
      git commit -m "ignore untracked daft files"
      git push origin main
    expect:
      exit_code: 0

  - name: Write visitor daft.yml version A in main
    run: >
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name:
      setup\n        run: echo setup-v1\n' > $WORK_DIR/test-repo/main/daft.yml
    expect:
      exit_code: 0

  - name: Create feature worktree (seeds a copy of A)
    run: git-worktree-checkout -b feat/x
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      file_contains:
        - path: "$WORK_DIR/test-repo/feat/x/daft.yml"
          content: "setup-v1"

  - name: Refine feat/x's daft.yml with an extra named job
    run: >
      printf 'hooks:\n  worktree-post-create:\n    jobs:\n      - name:
      setup\n        run: echo setup-v1\n      - name: extra\n        run: echo
      extra-job\n' > $WORK_DIR/test-repo/feat/x/daft.yml
    expect:
      exit_code: 0

  - name: Push feat/x so it tracks origin
    run: git -C $WORK_DIR/test-repo/feat/x push -u origin feat/x
    expect:
      exit_code: 0

  - name: Delete the remote branch (merged - no unique commits)
    run: git -C $WORK_DIR/test-repo/main push origin --delete feat/x
    expect:
      exit_code: 0

  - name: Prune keeps the refined worktree and summarizes
    run: git-worktree-prune 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "Keeping feat/x"
        - "daft file merge"
      dirs_exist:
        - "$WORK_DIR/test-repo/feat/x"

  - name: Forced prune discards the refinement to a stash
    run: git-worktree-prune --force 2>&1
    cwd: "$WORK_DIR/test-repo/main"
    expect:
      exit_code: 0
      files_exist:
        - "$WORK_DIR/test-repo/.git/.daft/discarded/feat/x/daft.yml"

  - name: Worktree is gone and main's daft.yml never gained the refinement
    run: test ! -d $WORK_DIR/test-repo/feat/x
    expect:
      exit_code: 0
      file_not_contains:
        - path: "$WORK_DIR/test-repo/main/daft.yml"
          content: "extra-job"
      file_contains:
        - path: "$WORK_DIR/test-repo/.git/.daft/discarded/feat/x/daft.yml"
          content: "extra-job"
