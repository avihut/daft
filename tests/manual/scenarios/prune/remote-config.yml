name: Prune with remote config
description: Prune works correctly with remote configuration

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"

  - name: Verify remote is configured
    run: |
      result=$(git remote get-url origin)
      test -n "$result" && echo "REMOTE_OK"
    cwd: "$WORK_DIR/test-repo/feature/test-feature"
    expect:
      output_contains:
        - "REMOTE_OK"

  - name: Delete feature branch from remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp" && git push origin --delete feature/test-feature 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Prune removes worktree
    run: git-worktree-prune
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      files_not_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"
