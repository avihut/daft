name: Prune errors
description:
  Prune succeeds with nothing to do and fails outside a git repository

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Prune succeeds with no prunable worktrees
    run: git-worktree-prune
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Prune fails outside git repository
    run: git-worktree-prune 2>&1
    expect:
      exit_code: 1
