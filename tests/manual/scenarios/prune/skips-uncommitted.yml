name: Prune skips uncommitted changes
description: Prune without --force skips worktrees with modified tracked files

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"

  - name: Modify a tracked file in feature worktree
    run:
      echo "Modified content" >>
      $WORK_DIR/test-repo/feature/test-feature/file.txt
    expect:
      exit_code: 0

  - name: Delete feature branch from remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp" && git push origin --delete feature/test-feature 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Prune without --force skips worktree with modified tracked files
    run: git-worktree-prune 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"
