name: Prune no deletion
description: Prune is safe when no remote branches have been deleted

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout develop branch
    run: git-worktree-checkout develop
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"

  - name: Checkout feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"

  - name: Run prune with nothing to delete
    run: git-worktree-prune
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/develop"
        - "$WORK_DIR/test-repo/feature/test-feature"
