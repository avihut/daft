name: Prune from current worktree
description: Pruning from inside the worktree being pruned writes DAFT_CD_FILE

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/main"

  - name: Checkout feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"

  - name: Delete feature branch from remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp" && git push origin --delete feature/test-feature 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Prune from inside the worktree being pruned
    run: |
      cd $WORK_DIR/test-repo/feature/test-feature
      cd_file=$(mktemp)
      DAFT_CD_FILE="$cd_file" git-worktree-prune 2>&1 || true
      cat "$cd_file" > $WORK_DIR/cd_target.txt
      rm -f "$cd_file"
    expect:
      file_contains:
        - path: "$WORK_DIR/cd_target.txt"
          content: "test-repo"

  - name: Verify worktree was removed
    run: test ! -d "$WORK_DIR/test-repo/feature/test-feature" && echo "REMOVED"
    expect:
      output_contains:
        - "REMOVED"
