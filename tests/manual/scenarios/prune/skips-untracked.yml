name: Prune skips dirty worktrees
description:
  Prune without --force skips worktrees with untracked files or uncommitted
  changes

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Checkout feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"

  - name: Add untracked file to feature worktree
    run:
      echo "Untracked content" >
      $WORK_DIR/test-repo/feature/test-feature/untracked.txt
    expect:
      exit_code: 0

  - name: Delete feature branch from remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp" && git push origin --delete feature/test-feature 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Prune without --force skips dirty worktree
    run: git-worktree-prune 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"
      files_exist:
        - "$WORK_DIR/test-repo/feature/test-feature/untracked.txt"
