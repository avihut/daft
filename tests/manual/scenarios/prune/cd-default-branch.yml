name: Prune cd default branch
description:
  prune.cdTarget=default-branch config directs cd to default branch worktree

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Set cdTarget config to default-branch
    run: git config daft.prune.cdTarget default-branch
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0

  - name: Checkout feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/test-feature"

  - name: Delete feature branch from remote
    run: |
      temp=$(mktemp -d)
      git clone $REMOTE_TEST_REPO "$temp" 2>/dev/null
      cd "$temp" && git push origin --delete feature/test-feature 2>/dev/null
      rm -rf "$temp"
    expect:
      exit_code: 0

  - name: Prune from inside worktree with cdTarget=default-branch
    run: |
      cd $WORK_DIR/test-repo/feature/test-feature
      cd_file=$(mktemp)
      DAFT_CD_FILE="$cd_file" git-worktree-prune 2>&1 || true
      cat "$cd_file" > $WORK_DIR/cd_target.txt
      rm -f "$cd_file"
    expect:
      file_contains:
        - path: "$WORK_DIR/cd_target.txt"
          content: "main"
