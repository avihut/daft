name: Rename fails if source branch not found
description: Fails if source branch does not exist

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_TEST_REPO
    expect:
      exit_code: 0

  - name: Rename nonexistent branch should fail
    run: git-worktree-branch -m nonexistent-branch new-name 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1
