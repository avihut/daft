name: Rename fails if destination branch exists
description: Fails if destination branch already exists

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone and create two branches
    run: |
      git-worktree-clone $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/source
      git-worktree-checkout -b feature/dest
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/source"
        - "$WORK_DIR/test-repo/feature/dest"

  - name: Rename source to dest should fail
    run: git-worktree-branch -m feature/source feature/dest 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 1

  - name: Verify nothing changed
    run: |
      test -d $WORK_DIR/test-repo/feature/source && test -d $WORK_DIR/test-repo/feature/dest
    expect:
      exit_code: 0
