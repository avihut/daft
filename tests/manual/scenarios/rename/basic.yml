name: Rename basic
description: Branch and worktree rename works correctly

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone and create feature branch
    run: |
      git-worktree-clone $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/old-name
      cd $WORK_DIR/test-repo/feature/old-name
      echo "content" > file.txt
      git add file.txt
      git commit -m "Add file"
    expect:
      exit_code: 0

  - name: Rename the branch
    run: git-worktree-branch -m feature/old-name feature/new-name 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/new-name"
      files_not_exist:
        - "$WORK_DIR/test-repo/feature/old-name"
