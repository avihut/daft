name: Rename by relative worktree path
description: Rename using relative worktree path as source

repos:
  - name: test-repo
    use_fixture: standard-remote

steps:
  - name: Clone and create feature branch
    run: |
      git-worktree-clone $REMOTE_TEST_REPO
      cd $WORK_DIR/test-repo
      git-worktree-checkout -b feature/by-path
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/by-path"

  - name: Rename using relative path as source
    run: git-worktree-branch -m feature/by-path feature/path-renamed 2>&1
    cwd: "$WORK_DIR/test-repo"
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/test-repo/feature/path-renamed"
      files_not_exist:
        - "$WORK_DIR/test-repo/feature/by-path"
