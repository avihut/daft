name: sync --push times out a hung pre-push hook
description:
  "daft.sync.pushTimeout bounds one push unit (git + pre-push hook): a hook that
  hangs past the budget is torn down, the push fails with a timeout hint instead
  of wedging the sync, and nothing survives the teardown."

repos:
  - name: push-timeout-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_PUSH_TIMEOUT_REPO
    expect:
      exit_code: 0
      dirs_exist:
        - "$WORK_DIR/push-timeout-repo/main"

  - name: Set local identity so the feature branch is owned
    run: |
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
    cwd: "$WORK_DIR/push-timeout-repo/main"
    expect: { exit_code: 0 }

  - name: Checkout the feature branch
    run: git-worktree-checkout feature/test-feature
    cwd: "$WORK_DIR/push-timeout-repo/main"
    expect:
      exit_code: 0

  - name: Commit an owned change on the feature branch
    run: |
      echo "owned change" > owned.txt
      git add owned.txt
      GIT_AUTHOR_EMAIL="me@example.com" GIT_COMMITTER_EMAIL="me@example.com" \
        git commit -m "Owned commit"
    cwd: "$WORK_DIR/push-timeout-repo/feature/test-feature"
    expect: { exit_code: 0 }

  - name: Install a hanging pre-push hook and a 2s push budget
    run: |
      mkdir -p $WORK_DIR/timeout-hooks
      printf '#!/bin/sh\necho "hook stalling"\nsleep 60\n' > $WORK_DIR/timeout-hooks/pre-push
      chmod +x $WORK_DIR/timeout-hooks/pre-push
      git config core.hooksPath $WORK_DIR/timeout-hooks
      git config daft.sync.pushTimeout 2s
    cwd: "$WORK_DIR/push-timeout-repo/feature/test-feature"
    expect: { exit_code: 0 }

  - name: sync --push tears the hung unit down and reports the timeout
    run: git-worktree-sync --push 2>&1
    cwd: "$WORK_DIR/push-timeout-repo/feature/test-feature"
    expect:
      exit_code: 1
      output_contains:
        - "timed out after 2s"
        - "daft.sync.pushTimeout"

  - name: The remote branch was not updated
    run: |
      git fetch origin 2>/dev/null
      git rev-list --count origin/feature/test-feature..feature/test-feature
    cwd: "$WORK_DIR/push-timeout-repo/feature/test-feature"
    expect:
      exit_code: 0
      output_contains: ["1"]

  - name: The hook's process tree did not survive the teardown
    # The `[p]` bracket is the classic self-exclusion trick: the regex still
    # matches the hook's `sh .../timeout-hooks/pre-push` command line, but this
    # step's own `bash -c "<script>"` command line contains the literal text
    # "[p]re-push", which the regex does NOT match — so pgrep can't self-match
    # the checker (git push already reaped the hook before this step runs).
    run: pgrep -f "timeout-hooks/[p]re-push" || echo "no survivors"
    expect:
      exit_code: 0
      output_contains: ["no survivors"]
