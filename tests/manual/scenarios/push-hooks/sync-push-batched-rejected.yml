name: batched sync --push hook refusal fails the whole batch
description:
  "The batched strategy's documented coarseness: the pre-push hook fires once
  for every ref, so one refusal blocks every branch in the batch and sync exits
  non-zero with the hook's output."

repos:
  - name: batched-gate-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_BATCHED_GATE_REPO
    expect:
      exit_code: 0

  - name: Configure identity and the batched strategy
    run: |
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
      git config daft.sync.pushHookStrategy batched
    cwd: "$WORK_DIR/batched-gate-repo/main"
    expect: { exit_code: 0 }

  - name: Checkout two feature branches with owned commits
    run: |
      git-worktree-checkout feature/test-feature
      git-worktree-checkout develop
      cd ../feature/test-feature
      echo "gated a" > a.txt && git add a.txt
      GIT_AUTHOR_EMAIL="me@example.com" GIT_COMMITTER_EMAIL="me@example.com" \
        git commit -qm "Owned commit A"
      cd ../../develop
      echo "gated b" > b.txt && git add b.txt
      GIT_AUTHOR_EMAIL="me@example.com" GIT_COMMITTER_EMAIL="me@example.com" \
        git commit -qm "Owned commit B"
    cwd: "$WORK_DIR/batched-gate-repo/main"
    expect: { exit_code: 0 }

  - name: Install a refusing pre-push hook
    run: |
      mkdir -p $WORK_DIR/gate-hooks
      printf '#!/bin/sh\necho "BATCH GATE SAYS NO" >&2\nexit 1\n' > $WORK_DIR/gate-hooks/pre-push
      chmod +x $WORK_DIR/gate-hooks/pre-push
      git config core.hooksPath $WORK_DIR/gate-hooks
    cwd: "$WORK_DIR/batched-gate-repo/main"
    expect: { exit_code: 0 }

  - name: sync --push fails the whole batch with the hook's message
    run: git-worktree-sync --push 2>&1
    cwd: "$WORK_DIR/batched-gate-repo/main"
    expect:
      exit_code: 1
      output_contains:
        - "BATCH GATE SAYS NO"

  - name: Neither branch was updated on the remote
    run: |
      git fetch origin 2>/dev/null
      echo "feature: $(git rev-list --count origin/feature/test-feature..feature/test-feature)"
      cd ../../develop
      echo "develop: $(git rev-list --count origin/develop..develop)"
    cwd: "$WORK_DIR/batched-gate-repo/feature/test-feature"
    expect:
      exit_code: 0
      output_contains:
        - "feature: 1"
        - "develop: 1"
