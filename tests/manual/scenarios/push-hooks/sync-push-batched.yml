name: sync --push batched strategy pushes all branches with one hook run
description:
  "daft.sync.pushHookStrategy=batched collapses N per-branch pushes into one git
  push: the pre-push hook fires exactly once with every ref, and each branch
  still lands on the remote."

repos:
  - name: batched-push-repo
    use_fixture: standard-remote

steps:
  - name: Clone the repository
    run: git-worktree-clone --layout contained $REMOTE_BATCHED_PUSH_REPO
    expect:
      exit_code: 0

  - name: Set local identity so branches are owned
    run: |
      git config user.email "me@example.com"
      git config user.name "Me Testuser"
      git config daft.sync.pushHookStrategy batched
    cwd: "$WORK_DIR/batched-push-repo/main"
    expect: { exit_code: 0 }

  - name: Checkout two feature branches with owned commits
    run: |
      git-worktree-checkout feature/test-feature
      git-worktree-checkout develop
      cd ../feature/test-feature
      echo "batched a" > a.txt && git add a.txt
      GIT_AUTHOR_EMAIL="me@example.com" GIT_COMMITTER_EMAIL="me@example.com" \
        git commit -qm "Owned commit A"
      cd ../../develop
      echo "batched b" > b.txt && git add b.txt
      GIT_AUTHOR_EMAIL="me@example.com" GIT_COMMITTER_EMAIL="me@example.com" \
        git commit -qm "Owned commit B"
    cwd: "$WORK_DIR/batched-push-repo/main"
    expect: { exit_code: 0 }

  - name: Install a counting pre-push hook via core.hooksPath
    run: |
      mkdir -p $WORK_DIR/batch-hooks
      printf '#!/bin/sh\necho hookrun >> %s/hook-runs\ncat >> %s/hook-refs\nexit 0\n' \
        "$WORK_DIR" "$WORK_DIR" > $WORK_DIR/batch-hooks/pre-push
      chmod +x $WORK_DIR/batch-hooks/pre-push
      git config core.hooksPath $WORK_DIR/batch-hooks
    cwd: "$WORK_DIR/batched-push-repo/main"
    expect: { exit_code: 0 }

  - name: sync --push pushes both branches in one batch
    run: git-worktree-sync --push 2>&1
    cwd: "$WORK_DIR/batched-push-repo/main"
    expect:
      exit_code: 0

  - name: The hook ran exactly once
    run: wc -l < $WORK_DIR/hook-runs | tr -d ' '
    expect:
      exit_code: 0
      output_contains: ["1"]

  - name: The single hook run saw both refs on stdin
    run: |
      grep -c "refs/heads/" $WORK_DIR/hook-refs
    expect:
      exit_code: 0
      output_contains: ["2"]

  - name: Both branches landed on the remote
    run: |
      cd ../feature/test-feature
      echo "feature-ahead: $(git rev-list --count origin/feature/test-feature..feature/test-feature)"
      cd ../../develop
      echo "develop-ahead: $(git rev-list --count origin/develop..develop)"
    cwd: "$WORK_DIR/batched-push-repo/main"
    expect:
      exit_code: 0
      output_contains:
        - "feature-ahead: 0"
        - "develop-ahead: 0"
